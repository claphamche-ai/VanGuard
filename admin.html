<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanGuard | Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=3.3" />
</head>
<body class="admin-bg">
    
    <nav class="admin-topbar">
        <div class="admin-nav-group">
            <div class="admin-nav-item" onclick="alert('Accounts Panel (Coming Soon)')">
                <span class="icon">👥</span>
                <span class="label">Accounts</span>
            </div>
            <div class="admin-nav-item" onclick="location.href='dispatch.html'">
                <span class="icon">📡</span>
                <span class="label">Dispatch</span>
            </div>
            <div class="admin-nav-item" onclick="location.href='reporter.html'">
                <span class="icon">📝</span>
                <span class="label">Reporter</span>
            </div>
            <div class="admin-nav-item" onclick="alert('Settings Panel (Coming Soon)')">
                <span class="icon">⚙️</span>
                <span class="label">Settings</span>
            </div>
            <div class="admin-nav-item" onclick="alert('Help & Documentation (Coming Soon)')">
                <span class="icon">❓</span>
                <span class="label">Help</span>
            </div>
            <!-- Added Log Out to standard nav block -->
            <div class="admin-nav-item logout-item" onclick="location.href='index.html'">
                <span class="icon">🚪</span>
                <span class="label">Log Out</span>
            </div>
        </div>

        <div class="admin-controls">
            <button id="admin-fs-btn" class="admin-btn" onclick="toggleAdminFS()" title="Full Screen">⛶</button>
        </div>
    </nav>

    <main class="admin-content">
        <div class="admin-welcome-box">
            <div class="login-frame" style="margin: 0 auto 30px;">🚐</div>
            <h1 style="font-size: 36px; font-weight: 900; color: var(--text-dark); margin: 0; text-transform: uppercase; letter-spacing: -1px;">VanGuard</h1>
            <p style="font-size: 14px; font-weight: bold; color: #888; margin: 0 0 30px 0;">Version 3.3 | Admin Console</p>
            
            <p style="font-size: 16px; color: #555; line-height: 1.6; margin-bottom: 40px;">
                Welcome to the VanGuard Regional Management Portal. Select a module from the top navigation bar to manage field ops, view intelligence reports, or configure your regional settings.
            </p>

            <button class="std-btn blue" style="max-width: 200px; margin: 0 auto;" onclick="alert('Intelligence Module (Coming Soon)')">View Reports</button>
        </div>
    </main>

    <script>
        function toggleAdminFS() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
            const btn = document.getElementById('admin-fs-btn');
            
            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
                btn.innerText = "🗗"; 
            } else {
                cancelFullScreen.call(doc);
                btn.innerText = "⛶"; 
            }
        }
    </script>
</body>
</html>
