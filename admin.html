<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanGuard | Tenant Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=3.21" />
</head>
<body class="admin-bg">
    <nav class="admin-topbar">
        <div class="admin-nav-group">
            <div class="admin-nav-item logout-item" onclick="location.href='index.html'">
                <span class="icon">🚪</span>
                <span class="label">Log Out</span>
            </div>
            <div class="admin-nav-item active-nav" onclick="switchAdminTab('welcome')">
                <span class="icon">🏠</span>
                <span class="label">Home</span>
            </div>
            <div class="admin-nav-item" onclick="location.href='dispatch.html'">
                <span class="icon">📡</span>
                <span class="label">Dispatch</span>
            </div>
            <div class="admin-nav-item" onclick="switchAdminTab('settings')">
                <span class="icon">⚙️</span>
                <span class="label">Settings</span>
            </div>
        </div>
        <div class="admin-controls">
            <button id="admin-fs-btn" class="admin-btn" onclick="toggleAdminFS()" title="Full Screen">⛶</button>
        </div>
    </nav>
    <main class="admin-content">
        <div id="admin-tab-welcome" class="admin-welcome-box admin-tab-content">
            <h1 style="font-size: 36px; font-weight: 900; color: var(--text-dark); margin: 0; text-transform: uppercase; letter-spacing: -1px;">VanGuard</h1>
            <p style="font-size: 14px; font-weight: bold; color: #888; margin: 5px 0 30px 0;">Version 3.21 | Regional Console</p>
        </div>
        <div id="admin-tab-settings" class="admin-tab-content" style="display:none; width: 100%; max-width: 900px;">
            <div id="settings-overview">
                <h2 style="margin-top:0; color: var(--text-dark); font-weight: 900; text-transform: uppercase; margin-bottom: 20px;">System Configuration</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="tenant-panel">
                        <h3 style="margin-top:0; color: var(--b);">Data Collection Fields</h3>
                        <button class="std-btn blue" onclick="openSettingsSubPanel('fields')">Manage Form Fields</button>
                    </div>
                </div>
            </div>
            <div id="settings-panel-fields" style="display:none;">
                <button class="std-btn gray" onclick="closeSettingsSubPanel()" style="max-width: 150px; margin-bottom: 20px; font-size: 12px; padding: 10px;">⬅ Back to Settings</button>
                <div class="tenant-panel" style="padding-top: 20px;">
                    <div id="admin-schema-render"></div>
                </div>
            </div>
        </div>
    </main>
    <script src="app.js?v=3.21"></script>
    <script>
        function switchAdminTab(tabId) {
            document.querySelectorAll('.admin-tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('admin-tab-' + tabId).style.display = 'block';
            document.querySelectorAll('.admin-nav-item').forEach(el => el.classList.remove('active-nav'));
            event.currentTarget.classList.add('active-nav');
            if(tabId === 'settings') { closeSettingsSubPanel(); }
        }
        function openSettingsSubPanel(panelName) {
            document.getElementById('settings-overview').style.display = 'none';
            document.getElementById('settings-panel-' + panelName).style.display = 'block';
        }
        function closeSettingsSubPanel() {
            document.getElementById('settings-panel-fields').style.display = 'none';
            document.getElementById('settings-overview').style.display = 'block';
        }
        function toggleAdminFS() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); } 
            else { document.exitFullscreen(); }
        }
    </script>
</body>
</html>
