<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanGuard | Tools</title>
    <link rel="stylesheet" href="styles.css?v=4.9.4" />
    <style>body{background:transparent;}</style>
</head>
<body data-role="tools">
    <div class="module-content">
        
        <div id="tools-main-menu">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h2 style="margin:0; font-weight: 900; text-transform: uppercase;">Admin Tools</h2>
                    <div style="font-size: 13px; font-weight: bold; color: var(--b);">System Utilities</div>
                </div>
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="tenant-panel" style="text-align: center; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'" onclick="ToolsCtrl.switchView('kml-manager')">
                    <div style="font-size: 50px; margin-bottom: 15px;">🗺️</div>
                    <h3 style="margin:0 0 10px 0; color: var(--text-dark);">KML Manager</h3>
                    <p style="font-size: 13px; color: #666; margin: 0;">Upload, edit, and configure dynamic map layers.</p>
                </div>
                
                <div class="tenant-panel" style="text-align: center; opacity: 0.5;">
                    <div style="font-size: 50px; margin-bottom: 15px;">📊</div>
                    <h3 style="margin:0 0 10px 0; color: var(--text-dark);">Historical Data</h3>
                    <p style="font-size: 13px; color: #666; margin: 0;">Pending DB Integration.</p>
                </div>
            </div>
        </div>

        <div id="tools-kml-manager" style="display: none;">
            <button class="std-btn gray" style="max-width: 150px; margin-bottom: 20px;" onclick="ToolsCtrl.switchView('main-menu')">⬅ Back to Tools</button>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0; font-weight: 900; text-transform: uppercase;">KML Manager</h2>
                <button class="std-btn green" style="width: auto; padding: 10px 20px;" onclick="ToolsCtrl.openUploadForm()">➕ Upload Layer</button>
            </div>

            <div id="kml-upload-form" class="tenant-panel" style="display: none; background: #e3f2fd; border-color: var(--b); margin-bottom: 20px; padding: 20px;">
                <h3 style="margin-top:0; color: var(--b); font-size: 14px; text-transform: uppercase;">New Map Layer</h3>
                <div class="form-grid" style="grid-template-columns: 2fr 1fr 1fr;">
                    <div><label class="section-label" style="margin-top:0;">Layer Name</label><input type="text" id="new-kml-label" class="std-input" placeholder="e.g., Sub-stations"></div>
                    <div><label class="section-label" style="margin-top:0;">Color</label><input type="color" id="new-kml-color" class="std-input" value="#e74c3c" style="padding: 5px; height: 48px;"></div>
                    <div><label class="section-label" style="margin-top:0;">Icon</label>
                        <select id="new-kml-icon" class="std-input">
                            <option value="📍">📍 Pin</option><option value="⚡">⚡ Electric</option><option value="🛣️">🛣️ Road</option>
                            <option value="🌉">🌉 Bridge</option><option value="🏢">🏢 Building</option><option value="🌳">🌳 Park</option>
                        </select>
                    </div>
                </div>
                <input type="file" id="kml-file-input" accept=".kml" style="display:none;" onchange="ToolsCtrl.handleFileSelect(this)">
                <div style="display: flex; gap: 10px; margin-top: 10px; align-items: center;">
                    <button class="std-btn yellow" style="width: auto; padding: 10px 20px;" onclick="document.getElementById('kml-file-input').click()">📁 Select .KML File</button>
                    <span id="kml-file-name" style="font-size: 12px; color: #666; font-style: italic;">No file selected</span>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 15px;">
                    <button class="std-btn blue" style="width: auto; padding: 10px 30px;" onclick="ToolsCtrl.processUpload()">Save Layer</button>
                    <button class="std-btn red" style="width: auto; padding: 10px 30px;" onclick="ToolsCtrl.closeUploadForm()">Cancel</button>
                </div>
            </div>

            <div class="tenant-panel" style="padding: 0; overflow: hidden; background: transparent; border: none;">
                <div id="kml-list-render"></div>
            </div>
        </div>

    </div>
    <div class="version-stamp">v4.9.4</div>
    <script src="app.js?v=4.9.4"></script>
</body>
</html>
