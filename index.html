<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track Tags | Field Ops v15</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --safety-yellow: #f1c40f;
            --action-blue: #2980b9;
            --white: rgba(255, 255, 255, 0.94);
            --black: #1a1a1a;
            --menu-bg: rgba(26, 26, 26, 0.75);
            --soft-radius: 18px;
            --urgent-red: #ff4757;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* HEADER & FULLSCREEN */
        .header-controls {
            position: absolute; top: 15px; left: 80px; z-index: 2000;
            display: flex; gap: 10px; pointer-events: none;
        }
        .fs-btn {
            background: #000; color: #fff; padding: 12px 18px; border: 2px solid var(--safety-yellow);
            border-radius: 12px; font-weight: 900; font-size: 11px; cursor: pointer;
            text-transform: uppercase; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* MENU TRIGGER */
        .menu-trigger {
            position: absolute; top: 15px; left: 15px; z-index: 2005;
            background: var(--safety-yellow); border: 2px solid var(--black);
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .menu-trigger span { width: 24px; height: 3px; background: var(--black); margin: 2.5px 0; border-radius: 2px; }

        /* SIDEBAR & CLOSE X */
        #sidebar {
            position: fixed; top: 0; left: -320px; width: 310px; height: 100%;
            background: var(--menu-bg); backdrop-filter: blur(12px);
            z-index: 3000; transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            color: white; padding: 25px; box-sizing: border-box;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        #sidebar.open { left: 0; }
        .sidebar-close {
            position: absolute; top: 20px; right: 20px; width: 35px; height: 35px;
            background: rgba(255,255,255,0.1); color: #fff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; font-size: 18px;
        }

        .sidebar-header { font-size: 26px; font-weight: 900; color: var(--safety-yellow); margin-bottom: 25px; border-bottom: 1px solid #444; padding-bottom: 15px; }
        
        .nav-item {
            padding: 16px; margin: 10px 0; border-radius: var(--soft-radius);
            background: rgba(255,255,255,0.06); cursor: pointer;
            display: flex; align-items: center; transition: background 0.2s;
            font-weight: 600;
        }
        .nav-item i { margin-right: 15px; font-style: normal; font-size: 22px; }

        #layer-container { display: none; margin: 10px 0 20px 0; padding-left: 5px; max-height: 40vh; overflow-y: auto; }
        .layer-row { display: flex; align-items: center; margin: 14px 0; font-size: 14px; }
        .layer-row input { width: 24px; height: 24px; margin-right: 15px; cursor: pointer; accent-color: var(--safety-yellow); }
        .layer-label-pill { display: flex; align-items: center; background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }

        /* UI ELEMENTS */
        #quick-info { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: var(--white); border-radius: var(--soft-radius); z-index: 4000; display: none; box-shadow: 0 30px 60px rgba(0,0,0,0.5); overflow: hidden; }
        .info-close-btn { position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; background: var(--urgent-red); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        #work-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 5000; display: none; flex-direction: column; }
        
        .ui-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>
<body>

    <div id="menu-trigger" class="menu-trigger" onclick="openSidebar()">
        <span></span><span></span><span></span>
    </div>

    <div class="header-controls">
        <button class="fs-btn" onclick="toggleFS()">Maximize Map</button>
    </div>

    <div id="sidebar">
        <div class="sidebar-close" onclick="closeSidebar()">✕</div>
        <div class="sidebar-header">TRACK TAGS</div>
        <div class="nav-item" onclick="toggleLayers()"><i>🗺️</i> Map Layers</div>
        <div id="layer-container"></div>
        
        <div class="nav-item" onclick="alert('Accessing Job Bank...')"><i>📋</i> Job Bank</div>
        <div class="nav-item" onclick="alert('Switching to Add Site Mode...')"><i>➕</i> Add Site</div>
        <div class="nav-item" style="margin-top: 40px; color: var(--urgent-red);" onclick="location.reload()"><i>🚪</i> Log Out</div>
    </div>

    <div id="map"></div>

    <div id="quick-info">
        <div class="info-close-btn" onclick="document.getElementById('quick-info').style.display='none'">✕</div>
        <div id="q-icon" style="height:140px; background:#111; display:flex; align-items:center; justify-content:center; font-size:50px; color:white;">⚡</div>
        <div style="padding:22px;">
            <h2 id="q-name" style="margin:0;">SITE NAME</h2>
            <p id="q-addr" style="font-size:14px; color:#666; margin:8px 0 15px 0;">--</p>
            <div id="q-status-pill" style="padding:10px; border-radius:10px; font-weight:bold; text-align:center;">Last Action: --</div>
        </div>
        <button style="width:100%; background:var(--safety-yellow); border:none; padding:20px; font-weight:900; font-size:16px; cursor:pointer;" onclick="openWorkModal()">ENTER SITE</button>
    </div>

    <div id="work-modal">
        <div style="background:#000; color:white; padding:20px; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:900;">WORK DASHBOARD</span>
            <button onclick="document.getElementById('work-modal').style.display='none'" style="background:var(--safety-yellow); border:none; padding:10px 20px; border-radius:10px; font-weight:900;">EXIT</button>
        </div>
        <div style="padding:20px;">
            <div style="background:#f4f4f4; padding:25px; border-radius:20px; margin-bottom:20px;">
                <h1 id="m-name" style="margin:0;">SITE</h1>
                <p id="m-meta" style="color:#666; margin-top:5px;">Location Info</p>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div style="background:var(--action-blue); color:white; padding:30px 10px; border-radius:16px; text-align:center; font-weight:bold;" onclick="alert('Logged')">INSPECTION</div>
                <div style="background:var(--action-blue); color:white; padding:30px 10px; border-radius:16px; text-align:center; font-weight:bold;" onclick="alert('Logged')">GRAFFITI</div>
                <div style="background:var(--action-blue); color:white; padding:30px 10px; border-radius:16px; text-align:center; font-weight:bold;" onclick="alert('Logged')">LITTER</div>
                <div style="background:var(--action-blue); color:white; padding:30px 10px; border-radius:16px; text-align:center; font-weight:bold;" onclick="alert('Logged')">GENERAL</div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([-41.135, 174.84], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let idleTimer;
        const menuTrigger = document.getElementById('menu-trigger');
        const sidebar = document.getElementById('sidebar');

        function startIdleTimer() {
            menuTrigger.classList.remove('ui-hidden');
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                if (!sidebar.classList.contains('open')) {
                    menuTrigger.classList.add('ui-hidden');
                }
            }, 5000);
        }

        ['mousedown', 'touchstart', 'mousemove'].forEach(e => window.addEventListener(e, startIdleTimer));
        startIdleTimer();

        function openSidebar() { sidebar.classList.add('open'); }
        function closeSidebar() { sidebar.classList.remove('open'); startIdleTimer(); }

        function toggleLayers() { 
            const container = document.getElementById('layer-container');
            container.style.display = container.style.display === 'block' ? 'none' : 'block';
        }

        const config = [
            { file: 'Assets Map- Alleyway sites.csv.kml', label: 'Alleyways', color: '#ff00ff', icon: '🛣️', isPath: true },
            { file: 'Wellington Electricity substation sites.kml', label: 'Substations', color: '#f1c40f', icon: '⚡' },
            { file: 'PCC Underpasses.kml', label: 'Underpasses', color: '#e74c3c', icon: '🌉' },
            { file: 'Thompson Property Group & Unique Paint SItes.kml', label: 'Unique Paint', color: '#9b59b6', icon: '💎' },
            { file: 'Traffic Light Box Sites.kml', label: 'Traffic Boxes', color: '#2ecc71', icon: '🚦' },
            { file: 'Community Buildings.kml', label: 'Comm. Buildings', color: '#3498db', icon: '🏠' },
            { file: 'PCC Mural Sites.kml', label: 'Murals', color: '#d35400', icon: '🖼️' },
            { file: 'Power Pole Area Sweeps.kml', label: 'Power Poles', color: '#000', icon: '💈', isPath: true },
            { file: 'PCC Off-street Carparks.kml', label: 'Carparks', color: '#34495e', icon: '🚗' }
        ];

        let activeData = {};

        function loadLayer(item) {
            const group = L.geoJson(null, {
                style: () => {
                    const d = Math.floor(Math.random() * 90);
                    const c = d > 60 ? '#000' : (d > 30 ? '#555' : item.color);
                    return { color: c, weight: 14, opacity: 0.8, dashArray: item.isPath ? '12, 12' : '' };
                },
                pointToLayer: (feat, ll) => {
                    const d = Math.floor(Math.random() * 90);
                    const bg = d > 60 ? '#000' : (d > 30 ? '#555' : item.color);
                    return L.marker(ll, {
                        icon: L.divIcon({
                            className: 'marker-icon',
                            html: `<div style="background:${bg}; width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; font-size:22px; border:2px solid #fff; ${d > 60 ? 'animation: pulse 1s infinite;' : ''}">${item.icon}</div>`,
                            iconSize: [38, 38], iconAnchor: [19, 19]
                        })
                    });
                },
                onEachFeature: (feat, layer) => {
                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        const d = Math.floor(Math.random() * 90);
                        activeData = { name: feat.properties.name || "Asset", addr: feat.properties.address || "Porirua", days: d, icon: item.icon };
                        showQuick();
                    });
                }
            });
            omnivore.kml(item.file, null, group).addTo(map);

            const container = document.getElementById('layer-container');
            const row = document.createElement('div');
            row.className = 'layer-row';
            row.innerHTML = `<input type="checkbox" checked> <div class="layer-label-pill"><span>${item.icon}</span> <span style="margin-left:10px;">${item.label}</span></div>`;
            row.querySelector('input').onchange = (e) => { if(e.target.checked) map.addLayer(group); else map.removeLayer(group); };
            container.appendChild(row);
        }

        config.forEach(loadLayer);

        function showQuick() {
            document.getElementById('q-name').innerText = activeData.name;
            document.getElementById('q-addr').innerText = activeData.addr;
            document.getElementById('q-icon').innerText = activeData.icon;
            const pill = document.getElementById('q-status-pill');
            pill.innerText = `LAST INSPECTED: ${activeData.days} DAYS AGO`;
            pill.style.background = activeData.days > 60 ? '#ffeae6' : '#e6ffed';
            pill.style.color = activeData.days > 60 ? '#ff4757' : '#2ecc71';
            document.getElementById('quick-info').style.display = 'block';
        }

        function openWorkModal() {
            document.getElementById('m-name').innerText = activeData.name;
            document.getElementById('m-meta').innerText = activeData.addr;
            document.getElementById('work-modal').style.display = 'flex';
            document.getElementById('quick-info').style.display = 'none';
        }

        function toggleFS() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
    </script>
    <style> @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); filter: brightness(1.3); } 100% { transform: scale(1); } } </style>
</body>
</html>
