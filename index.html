<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track Tags | Porirua Operations v10</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --safety-yellow: #f1c40f;
            --action-blue: #2980b9;
            --white: #ffffff;
            --black: #000000;
            --grey: #f4f4f4;
            --border-width: 4px;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial Black', Gadget, sans-serif; background: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* UI OVERLAYS */
        .overlay-ui { position: absolute; z-index: 1000; pointer-events: auto; }
        
        .header {
            top: 10px; left: 10px; background: var(--safety-yellow);
            padding: 12px; border: var(--border-width) solid #000; font-size: 18px; font-weight: bold;
            box-shadow: 6px 6px 0px #000;
        }

        .fullscreen-btn {
            top: 10px; right: 10px; background: #000; color: #fff;
            padding: 10px 15px; border: 3px solid var(--safety-yellow); font-weight: bold;
            cursor: pointer; font-size: 12px; text-transform: uppercase;
        }

        .layer-list {
            top: 75px; left: 10px; background: #fff; border: var(--border-width) solid #000;
            padding: 10px; max-height: 40vh; overflow-y: auto; width: 220px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .layer-item { display: flex; align-items: center; margin: 10px 0; font-size: 12px; font-weight: bold; }
        .layer-item input { width: 28px; height: 28px; margin-right: 12px; cursor: pointer; }

        /* STAGE 1: FLOATING QUICK INFO */
        #quick-info {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; background: white; border: var(--border-width) solid #000;
            z-index: 3000; display: none; box-shadow: 12px 12px 0px rgba(0,0,0,0.4);
        }
        .quick-banner { width: 100%; height: 130px; background: #ccc; border-bottom: var(--border-width) solid #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .quick-banner img { width: 100%; height: 100%; object-fit: cover; }
        .quick-body { padding: 15px; }
        .quick-name { font-size: 20px; margin-bottom: 8px; line-height: 1.1; }
        .quick-meta { font-size: 13px; font-family: 'Arial', sans-serif; margin-bottom: 4px; color: #333; }
        .enter-btn {
            width: 100%; background: var(--safety-yellow); border: none; border-top: var(--border-width) solid #000;
            padding: 18px; font-weight: 900; font-size: 18px; cursor: pointer; text-transform: uppercase;
        }

        /* STAGE 2: FULL WORK MODAL */
        #work-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--white); z-index: 4000; display: none;
            flex-direction: column;
        }
        .modal-header { background: #000; color: #fff; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; overflow-y: auto; flex-grow: 1; }
        
        .site-card { background: var(--grey); border: var(--border-width) solid #000; padding: 20px; margin-bottom: 25px; box-shadow: 6px 6px 0px #ddd; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-btn {
            background: var(--action-blue); color: white; border: var(--border-width) solid #000;
            padding: 30px 10px; border-radius: 12px; font-weight: bold; text-align: center;
            font-size: 18px; text-transform: uppercase; cursor: pointer;
        }
        .action-btn:active { background: var(--safety-yellow); color: #000; }
        
        .history-btn {
            background: #444; color: white; border: var(--border-width) solid #000;
            padding: 20px; width: 100%; margin-top: 25px; font-weight: bold;
            font-size: 18px; text-transform: uppercase; cursor: pointer; border-radius: 8px;
        }

        .back-btn { background: #e74c3c; color: white; border: 3px solid #000; padding: 10px 20px; font-weight: bold; }

        /* MARKERS */
        .work-pin { border: 2px solid #000; border-radius: 50%; cursor: pointer !important; }
        .van-marker { font-size: 38px; text-shadow: 2px 2px 0px #000; }
    </style>
</head>
<body>

    <div class="overlay-ui header">TRACK TAGS v10</div>
    <button class="overlay-ui fullscreen-btn" onclick="toggleFullScreen()">Maximize Map</button>
    <div class="overlay-ui layer-list" id="layer-menu"></div>

    <div id="map"></div>

    <!-- Stage 1: Floating Quick Info -->
    <div id="quick-info">
        <div class="quick-banner">
            <img src="https://via.placeholder.com/400x200?text=SITE+PREVIEW" alt="Site Photo">
        </div>
        <div class="quick-body">
            <div id="q-name" class="quick-name">SITE NAME</div>
            <div id="q-addr" class="quick-meta"><b>Addr:</b> --</div>
            <div id="q-type" class="quick-meta"><b>Type:</b> --</div>
            <div id="q-inspected" class="quick-meta"><b>Last Inspected:</b> --</div>
        </div>
        <button class="enter-btn" onclick="openWorkModal()">Enter Site</button>
    </div>

    <!-- Stage 2: Full Site Modal -->
    <div id="work-modal">
        <div class="modal-header">
            <div style="font-weight:900; font-size: 20px;">SITE MANAGEMENT</div>
            <button class="back-btn" onclick="closeWorkModal()">EXIT SITE</button>
        </div>
        <div class="modal-body">
            <div class="site-card">
                <h1 id="m-name" style="margin-top:0; font-size: 28px;">SITE NAME</h1>
                <p id="m-addr" style="margin: 5px 0;">Location: --</p>
                <p id="m-type" style="margin: 5px 0;">Asset Type: --</p>
                <p style="margin: 5px 0; color: #d35400;"><b>Status:</b> Maintenance Due</p>
            </div>

            <div class="action-grid">
                <div class="action-btn" onclick="alert('Starting Site Inspection...')">Site Inspection</div>
                <div class="action-btn" onclick="alert('Starting Graffiti Removal...')">Graffiti Removal</div>
                <div class="action-btn" onclick="alert('Starting Litter Removal...')">Litter Removal</div>
                <div class="action-btn" onclick="alert('Starting General Work...')">General Work</div>
            </div>

            <button class="history-btn" onclick="alert('Loading Work History...')">View Work History</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        const map = L.map('map', { zoomControl: true, tap: false }).setView([-41.135, 174.84], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // VAN TRACKING & TRAIL
        let van = null;
        let trail = L.polyline([], {color: '#e74c3c', weight: 4, dashArray: '10, 10'}).addTo(map);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                const loc = [pos.coords.latitude, pos.coords.longitude];
                if (!van) van = L.marker(loc, {icon: L.divIcon({className:'van-marker', html:'🚐', iconSize:[40,40], iconAnchor:[20,20]})}).addTo(map);
                else van.setLatLng(loc);
                trail.addLatLng(loc);
            }, null, {enableHighAccuracy: true});
        }

        const config = [
            { file: 'Assets Map- Alleyway sites.csv.kml', label: 'Alleyways', color: '#ff00ff', isPath: true },
            { file: 'Wellington Electricity substation sites.kml', label: 'Substations', color: '#e67e22' },
            { file: 'PCC Underpasses.kml', label: 'Underpasses', color: '#e74c3c' },
            { file: 'Thompson Property Group & Unique Paint SItes.kml', label: 'Unique Paint', color: '#9b59b6' },
            { file: 'Traffic Light Box Sites.kml', label: 'Traffic Boxes', color: '#2ecc71' },
            { file: 'Community Buildings.kml', label: 'Comm. Buildings', color: '#1abc9c' },
            { file: 'PCC Mural Sites.kml', label: 'Murals', color: '#d35400' },
            { file: 'Power Pole Area Sweeps.kml', label: 'Power Poles', color: '#3498db', isPath: true },
            { file: 'PCC Off-street Carparks.kml', label: 'Carparks', color: '#34495e' }
        ];

        let activeSite = {};

        function getS() { return Math.max(12, map.getZoom() * 2.8); }

        function loadLayer(item) {
            const group = L.geoJson(null, {
                style: { color: item.color, weight: 15, opacity: 0.9, dashArray: item.isPath ? '15, 15' : '' },
                pointToLayer: (feat, ll) => L.marker(ll, {
                    icon: L.divIcon({
                        className: 'work-pin',
                        html: `<div style="background:${item.color}; width:100%; height:100%; border-radius:50%; border:3px solid #000;"></div>`,
                        iconSize: [getS(), getS()],
                        iconAnchor: [getS()/2, getS()/2]
                    })
                }),
                onEachFeature: (feat, layer) => {
                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        activeSite = {
                            name: feat.properties.name || "Site Asset",
                            addr: feat.properties.address || feat.properties.SUBURB || "Porirua District",
                            type: item.label,
                            last: "14 Days Ago" // Placeholder
                        };
                        showQuickInfo();
                    });
                }
            });

            omnivore.kml(item.file, null, group).addTo(map);

            const menu = document.getElementById('layer-menu');
            const div = document.createElement('div');
            div.className = 'layer-item';
            div.innerHTML = `<input type="checkbox" checked> <span style="background:${item.color}; color:#000; padding:2px 8px; border:2px solid #000;">${item.label}</span>`;
            div.querySelector('input').onchange = (e) => {
                if(e.target.checked) map.addLayer(group); else map.removeLayer(group);
            };
            menu.appendChild(div);
        }

        config.forEach(loadLayer);

        map.on('click', () => { document.getElementById('quick-info').style.display = 'none'; });

        function showQuickInfo() {
            document.getElementById('q-name').innerText = activeSite.name;
            document.getElementById('q-addr').innerHTML = "<b>Location:</b> " + activeSite.addr;
            document.getElementById('q-type').innerHTML = "<b>Type:</b> " + activeSite.type;
            document.getElementById('q-inspected').innerHTML = "<b>Last Inspected:</b> " + activeSite.last;
            document.getElementById('quick-info').style.display = 'block';
        }

        function openWorkModal() {
            document.getElementById('m-name').innerText = activeSite.name;
            document.getElementById('m-addr').innerText = "Location: " + activeSite.addr;
            document.getElementById('m-type').innerText = "Asset Type: " + activeSite.type;
            document.getElementById('work-modal').style.display = 'flex';
            document.getElementById('quick-info').style.display = 'none';
        }

        function closeWorkModal() { document.getElementById('work-modal').style.display = 'none'; }
        
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        map.on('zoomend', () => {
            const s = getS();
            document.querySelectorAll('.work-pin').forEach(el => {
                el.style.width = s+'px'; el.style.height = s+'px';
                el.style.marginLeft = -(s/2)+'px'; el.style.marginTop = -(s/2)+'px';
            });
        });
    </script>
</body>
</html>
