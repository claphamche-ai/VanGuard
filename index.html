<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track Tags | Porirua Field Ops v8</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --safety-yellow: #f1c40f;
            --action-blue: #2980b9;
            --high-vis-pink: #ff00ff;
            --white: #ffffff;
            --black: #000000;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Arial Black', sans-serif; background: #fff; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        .overlay-ui { position: absolute; z-index: 1000; pointer-events: auto; }
        
        .header {
            top: 10px; left: 10px; background: var(--safety-yellow);
            padding: 12px; border: 4px solid #000; font-size: 18px; font-weight: bold;
            box-shadow: 5px 5px 0px #000;
        }

        /* FULL SCREEN BUTTON */
        .fullscreen-btn {
            top: 10px; right: 10px; background: #000; color: #fff;
            padding: 12px; border: 3px solid var(--safety-yellow); font-weight: bold;
            cursor: pointer; font-size: 14px; text-transform: uppercase;
        }

        .layer-list {
            top: 75px; left: 10px; background: #fff; border: 4px solid #000;
            padding: 10px; max-height: 50vh; overflow-y: auto; width: 240px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
        }
        .layer-item { display: flex; align-items: center; margin: 12px 0; font-size: 13px; font-weight: bold; }
        .layer-item input { width: 32px; height: 32px; margin-right: 12px; cursor: pointer; }

        .work-pin {
            border: 3px solid #000;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            cursor: pointer !important;
        }

        .van-marker { font-size: 35px; text-shadow: 2px 2px 0px #000; }

        #data-panel {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: var(--white); border-top: 10px solid #000;
            padding: 25px; box-sizing: border-box; z-index: 2000;
            transition: bottom 0.3s ease-out;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
        }
        #data-panel.active { bottom: 0; }

        .location-header { background: #eee; border: 4px solid #000; padding: 15px; margin-bottom: 20px; }
        #site-name { font-size: 24px; color: #000; }

        .record-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .record-btn {
            background: var(--action-blue); color: white; border: 4px solid #000;
            padding: 25px 5px; border-radius: 12px; font-size: 18px; font-weight: bold;
            text-align: center; cursor: pointer;
        }
        .close-btn { background: #000; color: #fff; border: none; padding: 15px; width: 100%; margin-top: 20px; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body id="body-container">

    <div class="overlay-ui header">TRACK TAGS v8</div>
    <button class="overlay-ui fullscreen-btn" onclick="toggleFullScreen()">Maximize Map</button>
    <div class="overlay-ui layer-list" id="layer-menu"></div>

    <div id="map"></div>

    <div id="data-panel">
        <div class="location-header">
            <div id="site-name">---</div>
            <div id="site-type" style="font-size:12px; color:#555; text-transform:uppercase;">---</div>
        </div>
        <div class="record-grid">
            <div class="record-btn" onclick="alert('CLEAN LOGGED')">CLEAN UP</div>
            <div class="record-btn" onclick="alert('INSPECT LOGGED')">INSPECT</div>
            <div class="record-btn" onclick="alert('LITTER LOGGED')">LITTER</div>
            <div class="record-btn" onclick="alert('PHOTO LOGGED')">PHOTO</div>
        </div>
        <button class="close-btn" onclick="closePanel()">DONE</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        const map = L.map('map', { zoomControl: true, tap: false }).setView([-41.135, 174.84], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // GPS Fleet Tracking
        let van = null;
        let trail = L.polyline([], {color: '#e74c3c', weight: 4, dashArray: '10, 10'}).addTo(map);
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                const loc = [pos.coords.latitude, pos.coords.longitude];
                if (!van) van = L.marker(loc, {icon: L.divIcon({className:'van-marker', html:'🚐', iconSize:[40,40], iconAnchor:[20,20]})}).addTo(map);
                else van.setLatLng(loc);
                trail.addLatLng(loc);
            }, null, {enableHighAccuracy: true});
        }

        const config = [
            { file: 'Assets Map- Alleyway sites.csv.kml', label: 'Alleyways', color: '#ff00ff', isPath: true },
            { file: 'Wellington Electricity substation sites.kml', label: 'Substations', color: '#e67e22' },
            { file: 'PCC Underpasses.kml', label: 'Underpasses', color: '#e74c3c' },
            { file: 'Thompson Property Group & Unique Paint SItes.kml', label: 'Unique Paint', color: '#9b59b6' },
            { file: 'Traffic Light Box Sites.kml', label: 'Traffic Boxes', color: '#2ecc71' },
            { file: 'Community Buildings.kml', label: 'Comm. Buildings', color: '#1abc9c' },
            { file: 'PCC Mural Sites.kml', label: 'Murals', color: '#d35400' },
            { file: 'Power Pole Area Sweeps.kml', label: 'Power Poles', color: '#3498db', isPath: true },
            { file: 'PCC Off-street Carparks.kml', label: 'Carparks', color: '#34495e' }
        ];

        function getS() { return Math.max(12, map.getZoom() * 2.8); }

        function loadLayer(item) {
            const group = L.geoJson(null, {
                style: { color: item.color, weight: 15, opacity: 0.9, dashArray: item.isPath ? '15, 15' : '' },
                pointToLayer: (feat, ll) => L.marker(ll, {
                    icon: L.divIcon({
                        className: 'work-pin',
                        html: `<div style="background:${item.color}; width:100%; height:100%; border-radius:50%; border:3px solid #000;"></div>`,
                        iconSize: [getS(), getS()],
                        iconAnchor: [getS()/2, getS()/2]
                    })
                }),
                onEachFeature: (feat, layer) => {
                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        document.getElementById('site-name').innerText = feat.properties.name || "Site Asset";
                        document.getElementById('site-type').innerText = item.label.toUpperCase();
                        document.getElementById('data-panel').classList.add('active');
                    });
                }
            });

            omnivore.kml(item.file, null, group).addTo(map);

            const menu = document.getElementById('layer-menu');
            const div = document.createElement('div');
            div.className = 'layer-item';
            div.innerHTML = `<input type="checkbox" checked> <span style="background:${item.color}; color:#000; padding:2px 8px; border:2px solid #000;">${item.label}</span>`;
            div.querySelector('input').onchange = (e) => {
                if(e.target.checked) map.addLayer(group); else map.removeLayer(group);
            };
            menu.appendChild(div);
        }

        config.forEach(loadLayer);
        map.on('zoomend', () => {
            const s = getS();
            document.querySelectorAll('.work-pin').forEach(el => {
                el.style.width = s+'px'; el.style.height = s+'px';
                el.style.marginLeft = -(s/2)+'px'; el.style.marginTop = -(s/2)+'px';
            });
        });

        function toggleFullScreen() {
            if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); }
            else { if (document.exitFullscreen) { document.exitFullscreen(); } }
        }
        function closePanel() { document.getElementById('data-panel').classList.remove('active'); }
    </script>
</body>
</html>
