<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanGuard | Login</title>
    <link rel="stylesheet" href="styles.css?v=3.12" />
</head>
<body class="login-wrapper">
    <div class="login-frame">🚐</div>
    <form class="login-form" onsubmit="handleLogin(event)">
        <input type="text" id="username" class="std-input" placeholder="Username" required autocomplete="off" autocorrect="off" autocapitalize="off">
        <input type="password" id="password" class="std-input" placeholder="Password" required>
        <button type="submit" class="std-btn yellow">Log In</button>
        <div id="login-error" style="color:#e74c3c; text-align:center; margin-top:5px; font-size:13px; font-weight:bold; display:none;">Invalid credentials</div>
    </form>
    <div class="login-brand">
        <h1>VanGuard <span class="version">v3.12</span></h1>
    </div>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.toLowerCase().trim();
            const p = document.getElementById('password').value.toLowerCase().trim();
            const err = document.getElementById('login-error');
            err.style.display = 'none';
            
            if (u === 'worker' && p === 'worker') { window.location.href = 'agent.html'; } 
            else if (u === 'dispatch' && p === 'dispatch') { window.location.href = 'dispatch.html'; } 
            else if (u === 'reporter' && p === 'reporter') { window.location.href = 'reporter.html'; } 
            else if (u === 'admin' && p === 'admin') { window.location.href = 'admin.html'; } 
            else if (u === 'god' && p === 'god') { window.location.href = 'god.html'; } 
            else { err.style.display = 'block'; }
        }
    </script>
</body>
</html>
