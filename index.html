<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanGuard | Login</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-bg">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-placeholder">🚐</div>
            <h1>VanGuard</h1>
            <p>Version 3.0</p>
            
            <form onsubmit="handleLogin(event)">
                <input type="text" id="username" class="login-input" placeholder="Username" required autocomplete="off" autocorrect="off" autocapitalize="off">
                <input type="password" id="password" class="login-input" placeholder="Password" required>
                <button type="submit" class="login-btn">Log In</button>
            </form>
            <div id="login-error" style="color:#e74c3c; margin-top:15px; font-size:13px; font-weight:bold; display:none;">Invalid credentials</div>
        </div>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.toLowerCase().trim();
            const p = document.getElementById('password').value.toLowerCase().trim();
            const err = document.getElementById('login-error');

            err.style.display = 'none';

            if (u === 'worker' && p === 'worker') {
                window.location.href = 'agent.html';
            } else if (u === 'dispatch' && p === 'dispatch') {
                window.location.href = 'dispatch.html';
            } else if (u === 'reporter' && p === 'reporter') {
                window.location.href = 'reporter.html';
            } else if (u === 'admin' && p === 'admin') {
                window.location.href = 'admin.html';
            } else {
                err.style.display = 'block';
            }
        }
    </script>
</body>
</html>
