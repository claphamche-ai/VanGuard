<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STOPTAGS | Field Ops v37</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <div id="live-timer-widget">00:00</div>

    <div id="menu-trigger" class="menu-trigger" onclick="openSidebar()">
        <span></span><span></span><span></span>
    </div>

    <div id="sidebar">
        <div class="sidebar-close" onclick="closeSidebar()">✕</div>
        <div class="sidebar-header">STOPTAGS</div>
        <div class="sidebar-version">v37.0.0</div>
        
        <div class="nav-item" onclick="toggleLayerList()">🗺️ Map Layers</div>
        <div id="layer-container" class="layer-list"></div>
        
        <div class="nav-item" onclick="alert('Job Bank coming soon')">📋 Job Bank</div>
        <div class="nav-item" style="margin-top:20px; color:red;" onclick="location.reload()">🚪 Log Out</div>
    </div>

    <div id="map"></div>
    
    <button id="gps-btn" onclick="centerGPS()">📍</button>

    <div id="site-info">
        <div class="info-header">
            <span id="s-name">Select Site</span>
            <button onclick="document.getElementById('site-info').style.display='none'">✕</button>
        </div>
        <div class="action-grid">
            <button class="action-btn blue" onclick="openOverlay('inspection')">Inspection</button>
            <button class="action-btn blue" onclick="openOverlay('work')">Log Work</button>
            <button class="action-btn gray" onclick="alert('History...')">History</button>
            <button class="action-btn green" onclick="alert('Add Site...')">Add Site</button>
        </div>
    </div>

    <!-- Log Work Overlay -->
    <div id="work-overlay" class="full-overlay">
        <div class="form-header"><span>LOG WORK</span><button onclick="closeOverlay('work')">✕</button></div>
        <div class="form-content">
            <p>Site: <strong class="site-display">--</strong></p>
            <div class="photo-grid">
                <div id="btn-before" class="photo-box" onclick="document.getElementById('photo-before').click()">📸 BEFORE</div>
                <div id="btn-after" class="photo-box" onclick="document.getElementById('photo-after').click()">📷 AFTER</div>
            </div>
            <input type="file" id="photo-before" accept="image/*" capture="environment" style="display:none;" onchange="handleWorkPhoto('before')">
            <input type="file" id="photo-after" accept="image/*" capture="environment" style="display:none;" onchange="handleWorkPhoto('after')">
            
            <button class="extra-photo-btn" onclick="document.getElementById('photo-work-extra').click()">➕ Add Mid-Job Photo</button>
            <div id="work-extra-count" class="extra-label">0 extra photos</div>
            <input type="file" id="photo-work-extra" multiple style="display:none;" onchange="updateExtraCount('work')">

            <label class="label">Medium</label>
            <select id="work-medium" onchange="handleDropdown(this)">
                <option value="">Select...</option>
                <option value="Spray Paint">Spray Paint</option>
                <option value="Paint">Paint</option>
                <option value="Felt Pen">Felt Pen</option>
                <option value="ADD_NEW">➕ Add New...</option>
            </select>
            <label class="label">Surface</label>
            <select id="work-surface" onchange="handleDropdown(this)">
                <option value="">Select...</option>
                <option value="Brick">Brick</option>
                <option value="Metal">Metal</option>
                <option value="ADD_NEW">➕ Add New...</option>
            </select>
            <label class="label">Property</label>
            <select id="work-property" onchange="handleDropdown(this)">
                <option value="">Select...</option>
                <option value="Commercial">Commercial</option>
                <option value="Private">Private</option>
                <option value="ADD_NEW">➕ Add New...</option>
            </select>
            <div class="footer-btns">
                <button id="pause-work-btn" class="btn-pause" disabled onclick="pauseJob()">Pause</button>
                <button id="submit-work-btn" class="btn-submit" disabled onclick="submitWork()">Submit</button>
            </div>
        </div>
    </div>

    <!-- Inspection Overlay -->
    <div id="inspection-overlay" class="full-overlay">
        <div class="form-header"><span>INSPECTION</span><button onclick="closeOverlay('inspection')">✕</button></div>
        <div class="form-content">
            <p>Site: <strong class="site-display">--</strong></p>
            <div class="photo-grid">
                <div id="btn-insp-start" class="photo-box" onclick="document.getElementById('photo-insp-start').click()">📸 START</div>
                <div id="btn-insp-end" class="photo-box" onclick="document.getElementById('photo-insp-end').click()">📷 END</div>
            </div>
            <input type="file" id="photo-insp-start" accept="image/*" capture="environment" style="display:none;" onchange="handleInspPhoto('start')">
            <input type="file" id="photo-insp-end" accept="image/*" capture="environment" style="display:none;" onchange="handleInspPhoto('end')">
            <textarea id="insp-notes" class="textarea" placeholder="Notes..."></textarea>
            <div class="footer-btns">
                <button id="pause-insp-btn" class="btn-pause" disabled onclick="pauseInsp()">Pause</button>
                <button id="submit-insp-btn" class="btn-submit" disabled onclick="submitInsp()">Submit</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
