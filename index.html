<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>VanGuard | Login</title><link rel="stylesheet" href="styles.css?v=5.0.0" /></head><body class="login-wrapper"><div class="login-frame">🚐</div><form class="login-form" onsubmit="handleLogin(event)"><input type="text" id="username" class="std-input" placeholder="Username" required><input type="password" id="password" class="std-input" placeholder="Password" required><button type="submit" class="std-btn yellow">Log In</button></form><div class="login-brand"><h1>VanGuard <span class="version">v5.0.0</span></h1></div><script src="app.js?v=5.0.0"></script><script>function handleLogin(e) { e.preventDefault(); const u = document.getElementById('username').value.toLowerCase().trim(); const p = document.getElementById('password').value.trim(); if(u==='god') { window.location.href='god.html'; return; } const user = CoreDB.getUsers().find(x=>x.username===u && x.password===p); if(user) { CoreDB.setActiveTenantId(user.tenantId); localStorage.setItem('vg_active_user', user.username); location.href = user.role + '.html'; } }</script></body></html>
