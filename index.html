<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Track Tags | Field Ops v26</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --safety-yellow: #f1c40f;
            --action-blue: #2980b9;
            --white: #ffffff;
            --black: #1a1a1a;
            --menu-bg: rgba(20, 20, 20, 0.85);
            --soft-radius: 12px;
            --urgent-red: #ff4757;
            --minor-orange: #f39c12;
            --good-green: #2ecc71;
            --pause-grey: #636e72;
            --disabled-grey: #bdc3c7;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #000; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        .menu-trigger {
            position: absolute; top: 15px; left: 15px; z-index: 2005;
            background: var(--safety-yellow); border: 2px solid var(--black);
            width: 50px; height: 50px; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        .menu-trigger span { width: 24px; height: 3px; background: var(--black); margin: 2.5px 0; border-radius: 2px; }

        .fs-btn {
            position: absolute; top: 15px; right: 15px; z-index: 2000;
            background: #000; color: #fff; padding: 12px 18px; border: 2px solid var(--safety-yellow);
            border-radius: 12px; font-weight: 900; font-size: 11px; cursor: pointer; text-transform: uppercase;
        }

        .version-tag {
            position: absolute; bottom: 10px; right: 10px; z-index: 2000;
            color: rgba(255, 255, 255, 0.4); font-size: 10px; font-weight: bold; pointer-events: none;
        }

        #sidebar {
            position: fixed; top: 0; left: -320px; width: 310px; height: 100%;
            background: var(--menu-bg); backdrop-filter: blur(15px);
            z-index: 3000; transition: left 0.4s ease;
            color: white; padding: 20px; box-sizing: border-box; border-right: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }
        #sidebar.open { left: 0; }
        .sidebar-header { font-size: 22px; font-weight: 900; color: var(--safety-yellow); margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; display: flex; align-items: baseline; gap: 8px; }
        
        .nav-item { padding: 14px; margin: 8px 0; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; display: flex; align-items: center; font-weight: 600; }
        #layer-container { display: none; margin: 5px 0 15px 0; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; }
        .layer-row { display: flex; align-items: center; margin: 12px 0; font-size: 13px; cursor: pointer; }

        #site-info { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; background: var(--white); border-radius: 20px; z-index: 4000; display: none; box-shadow: 0 30px 60px rgba(0,0,0,0.5); overflow: hidden; }
        .details-list { padding: 15px 20px; }
        .detail-item { margin-bottom: 6px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; }
        .detail-label { font-size: 9px; font-weight: 800; color: #999; text-transform: uppercase; }
        .detail-value { font-size: 13px; font-weight: 600; color: #222; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 15px 20px 15px; }
        .action-btn { background: var(--action-blue); color: white; border: none; padding: 12px 0; border-radius: 10px; font-weight: 700; font-size: 11px; cursor: pointer; text-align: center; text-transform: uppercase; }

        .full-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f8f9fa; z-index: 5000; display: none; flex-direction: column;
            overflow-y: auto; color: #333;
        }
        .form-header { background: #000; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
        .form-content { padding: 20px; flex-grow: 1; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-weight: 800; font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
        
        .insp-textarea { width: 100%; border: 2px solid #ddd; border-radius: 12px; padding: 12px; box-sizing: border-box; font-family: inherit; font-size: 16px; background: white; height: 80px; resize: none; }

        .photo-step-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .photo-step-btn { 
            background: #fff; border: 2px dashed #cbd5e0; padding: 20px 10px; 
            border-radius: 12px; text-align: center; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .photo-step-btn.done { border-style: solid; border-color: var(--good-green); background: #f0fff4; }

        .dual-btns { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; margin-top: 10px; }
        .submit-btn { background: var(--safety-yellow); color: #000; border: none; width: 100%; padding: 20px; font-weight: 900; font-size: 18px; border-radius: 15px; cursor: pointer; text-transform: uppercase; }
        .submit-btn:disabled { background: var(--disabled-grey); cursor: not-allowed; opacity: 0.7; }
        .pause-btn { background: var(--pause-grey); color: #fff; border: none; padding: 20px; font-weight: 900; font-size: 18px; border-radius: 15px; cursor: pointer; text-transform: uppercase; }

        /* LISTS */
        .list-item { background: white; margin-bottom: 10px; padding: 15px; border-radius: 12px; border-left: 5px solid var(--action-blue); cursor: pointer; position: relative; }
        .list-item.paused { border-left-color: var(--pause-grey); }
        .list-title { font-weight: 900; font-size: 16px; }
        .list-meta { font-size: 11px; color: #888; text-transform: uppercase; margin-top: 5px; }
        .badge { position: absolute; top: 15px; right: 15px; font-size: 9px; padding: 4px 8px; border-radius: 5px; font-weight: 900; background: #eee; }
        .badge.p { background: var(--pause-grey); color: white; }

        #job-bank-empty { text-align: center; color: #888; padding: 40px 20px; }
    </style>
</head>
<body>

    <div id="menu-trigger" class="menu-trigger" onclick="openSidebar()">
        <span></span><span></span><span></span>
    </div>

    <button class="fs-btn" onclick="toggleFS()">Maximize Map</button>
    <div class="version-tag">TRACK TAGS v26</div>

    <div id="sidebar">
        <div class="sidebar-header">TRACK TAGS <span class="v-label">v26</span></div>
        <div class="nav-item" onclick="toggleLayers()"><i>🗺️</i> Map Layers</div>
        <div id="layer-container"></div>
        <div class="nav-item" onclick="openOverlay('jobbank')"><i>📋</i> Job Bank</div>
        <div class="nav-item" onclick="alert('Add Site Mode...')"><i>➕</i> Add Site</div>
        <div class="nav-item" style="color: var(--urgent-red);" onclick="location.reload()"><i>🚪</i> Log Out</div>
    </div>

    <div id="map"></div>

    <div id="site-info">
        <div style="height:140px; background:#333; position:relative; display:flex; align-items:center; justify-content:center;">
            <div style="position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer;" onclick="document.getElementById('site-info').style.display='none'">✕</div>
            <div style="font-size:40px;">📸</div>
        </div>
        <div class="details-list">
            <div class="detail-item"><div class="detail-label">Name</div><div id="s-name" class="detail-value">--</div></div>
            <div class="detail-item"><div class="detail-label">Address</div><div id="s-addr" class="detail-value">--</div></div>
            <div class="detail-item"><div class="detail-label">Type</div><div id="s-type" class="detail-value">--</div></div>
            <div class="detail-item"><div class="detail-label">Last Inspected</div><div id="s-date" class="detail-value">--</div></div>
        </div>
        <div class="action-grid">
            <button class="action-btn" onclick="openOverlay('inspection')">Inspection</button>
            <button class="action-btn" onclick="openOverlay('work')">Log Work</button>
            <button class="action-btn" onclick="openOverlay('history')">History</button>
        </div>
    </div>

    <!-- Log Work Overlay -->
    <div id="work-overlay" class="full-overlay">
        <div class="form-header">
            <span style="font-weight:900; font-size:20px;">LOG WORK</span>
            <button onclick="closeOverlay('work')" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
        </div>
        <div class="form-content">
            <div class="form-group">
                <label class="form-label">Site: <span class="insp-site-display">--</span></label>
                <div class="insp-gps-display" style="font-size:11px; color:#888;">GPS: Identifying...</div>
            </div>

            <div class="form-group">
                <label class="form-label">Step 1 & 2: Mandatory Photos</label>
                <div class="photo-step-grid">
                    <div id="btn-before" class="photo-step-btn" onclick="document.getElementById('photo-before').click()">
                        <span style="font-size:24px;">📷</span>
                        <span id="label-before" style="font-size:11px; font-weight:900;">BEFORE PHOTO</span>
                        <span id="time-before" style="font-size:9px; opacity:0.6;">(Required)</span>
                    </div>
                    <div id="btn-after" class="photo-step-btn" onclick="document.getElementById('photo-after').click()">
                        <span style="font-size:24px;">📸</span>
                        <span id="label-after" style="font-size:11px; font-weight:900;">AFTER PHOTO</span>
                        <span id="time-after" style="font-size:9px; opacity:0.6;">(Final step)</span>
                    </div>
                </div>
                <input type="file" id="photo-before" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto('before')">
                <input type="file" id="photo-after" accept="image/*" capture="environment" style="display:none;" onchange="handlePhoto('after')">
            </div>

            <div id="timing-display" style="display:none; text-align:center; padding:10px; background:#e2e8f0; border-radius:10px; margin-bottom:20px; font-weight:900; color:var(--action-blue);">
                ACTIVE TIME: <span id="time-calc">0m</span>
            </div>

            <div class="form-group">
                <label class="form-label">Work Description</label>
                <textarea id="work-desc" class="insp-textarea" placeholder="Detail the work..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Materials</label>
                <textarea id="work-materials" class="insp-textarea" style="height:50px;" placeholder="Paint, chemicals, etc..."></textarea>
            </div>

            <div class="dual-btns">
                <button id="pause-work-btn" class="pause-btn" disabled onclick="pauseJob()">PAUSE</button>
                <button id="submit-work-btn" class="submit-btn" disabled onclick="submitWorkLog()">SUBMIT JOB</button>
            </div>
        </div>
    </div>

    <!-- Job Bank Overlay -->
    <div id="jobbank-overlay" class="full-overlay">
        <div class="form-header">
            <span style="font-weight:900; font-size:20px;">JOB BANK</span>
            <button onclick="closeOverlay('jobbank')" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
        </div>
        <div class="form-content">
            <div id="job-bank-list"></div>
        </div>
    </div>

    <!-- History Overlay -->
    <div id="history-overlay" class="full-overlay">
        <div class="form-header">
            <span style="font-weight:900; font-size:20px;">SITE HISTORY</span>
            <button onclick="closeOverlay('history')" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
        </div>
        <div class="form-content">
            <div id="history-list"></div>
        </div>
    </div>

    <!-- Inspection Overlay (Simplified) -->
    <div id="inspection-overlay" class="full-overlay">
        <div class="form-header"><span style="font-weight:900; font-size:20px;">INSPECTION</span><button onclick="closeOverlay('inspection')" style="background:none; border:none; color:white; font-size:24px;">✕</button></div>
        <div class="form-content">
            <label class="form-label">Site: <span class="insp-site-display">--</span></label>
            <textarea id="insp-comments" class="insp-textarea" placeholder="Notes..."></textarea>
            <button class="submit-btn" style="margin-top:20px;" onclick="closeOverlay('inspection')">Save Inspection</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false }).setView([-41.135, 174.84], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let vanPos = { lat: 0, lng: 0 };
        let activeSite = {};
        let currentJob = {
            startTime: null,
            pausedTimeAccumulated: 0,
            hasBefore: false,
            hasAfter: false
        };

        if (navigator.geolocation) {
            navigator.geolocation.watchPosition((pos) => {
                vanPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            }, null, {enableHighAccuracy: true});
        }

        function openSidebar() { document.getElementById('sidebar').classList.add('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        
        function openOverlay(type) {
            document.querySelectorAll('.full-overlay').forEach(o => o.style.display = 'none');
            document.getElementById(type + '-overlay').style.display = 'flex';
            document.querySelectorAll('.insp-site-display').forEach(el => el.innerText = activeSite.name);
            document.getElementById('site-info').style.display = 'none';
            if(type === 'history') renderHistory();
            if(type === 'jobbank') renderJobBank();
        }

        function closeOverlay(type) { document.getElementById(type + '-overlay').style.display = 'none'; }

        function handlePhoto(step) {
            const now = new Date();
            const btn = document.getElementById('btn-' + step);
            const label = document.getElementById('time-' + step);
            
            btn.classList.add('done');
            label.innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

            if (step === 'before') {
                currentJob.startTime = now;
                currentJob.hasBefore = true;
                document.getElementById('pause-work-btn').disabled = false;
            } else {
                currentJob.hasAfter = true;
                const activeMs = (now - currentJob.startTime) + currentJob.pausedTimeAccumulated;
                const activeMins = Math.round(activeMs / 60000);
                document.getElementById('timing-display').style.display = 'block';
                document.getElementById('time-calc').innerText = activeMins + " minutes";
                document.getElementById('submit-work-btn').disabled = false;
            }
        }

        function pauseJob() {
            const now = new Date();
            const elapsed = now - currentJob.startTime;
            
            const pausedJob = {
                site: activeSite.name,
                startTime: currentJob.startTime.toISOString(),
                accumulated: currentJob.pausedTimeAccumulated + elapsed,
                desc: document.getElementById('work-desc').value,
                mats: document.getElementById('work-materials').value,
                pausedAt: now.toLocaleDateString() + " " + now.toLocaleTimeString()
            };

            let bank = JSON.parse(localStorage.getItem('tt_jobbank') || '[]');
            bank.unshift(pausedJob);
            localStorage.setItem('tt_jobbank', JSON.stringify(bank));

            alert("Job Paused and added to Job Bank.");
            resetJobState();
            closeOverlay('work');
        }

        function resumeJob(index) {
            let bank = JSON.parse(localStorage.getItem('tt_jobbank') || '[]');
            const job = bank[index];
            
            activeSite.name = job.site;
            currentJob.startTime = new Date(); // New start for this segment
            currentJob.pausedTimeAccumulated = job.accumulated;
            currentJob.hasBefore = true;
            
            document.getElementById('work-desc').value = job.desc;
            document.getElementById('work-materials').value = job.mats;
            
            // Update UI to show "Before" is done
            const btn = document.getElementById('btn-before');
            btn.classList.add('done');
            document.getElementById('time-before').innerText = "RESUMED";
            document.getElementById('pause-work-btn').disabled = false;

            bank.splice(index, 1);
            localStorage.setItem('tt_jobbank', JSON.stringify(bank));
            
            openOverlay('work');
        }

        function resetJobState() {
            currentJob = { startTime: null, pausedTimeAccumulated: 0, hasBefore: false, hasAfter: false };
            document.getElementById('btn-before').classList.remove('done');
            document.getElementById('btn-after').classList.remove('done');
            document.getElementById('time-before').innerText = "(Required)";
            document.getElementById('time-after').innerText = "(Final step)";
            document.getElementById('work-desc').value = "";
            document.getElementById('work-materials').value = "";
            document.getElementById('timing-display').style.display = 'none';
            document.getElementById('submit-work-btn').disabled = true;
            document.getElementById('pause-work-btn').disabled = true;
        }

        function submitWorkLog() {
            const activeMins = Math.round(((new Date() - currentJob.startTime) + currentJob.pausedTimeAccumulated) / 60000);
            const desc = document.getElementById('work-desc').value;
            
            const logEntry = { site: activeSite.name, type: 'WORK', duration: activeMins, date: new Date().toLocaleDateString(), time: new Date().toLocaleTimeString() };
            let history = JSON.parse(localStorage.getItem('tt_history') || '[]');
            history.unshift(logEntry);
            localStorage.setItem('tt_history', JSON.stringify(history.slice(0, 20)));

            const body = `WORK LOG [v26]%0D%0ASite: ${activeSite.name}%0D%0AActive Time: ${activeMins} mins%0D%0ADescription: ${desc}`;
            window.location.href = `mailto:tracktagstgs@gmail.com?subject=Work Log: ${activeSite.name}&body=${body}`;
            
            resetJobState();
            closeOverlay('work');
        }

        function renderJobBank() {
            const list = document.getElementById('job-bank-list');
            const data = JSON.parse(localStorage.getItem('tt_jobbank') || '[]');
            if (data.length === 0) {
                list.innerHTML = '<div id="job-bank-empty">Job Bank is empty.<br>Dispatched jobs will appear here in Phase 2.</div>';
                return;
            }
            list.innerHTML = data.map((item, idx) => `
                <div class="list-item paused" onclick="resumeJob(${idx})">
                    <span class="badge p">PAUSED</span>
                    <div class="list-title">${item.site}</div>
                    <div class="list-meta">Paused: ${item.pausedAt}</div>
                    <div style="font-weight:bold; color:var(--pause-grey); font-size:11px;">ACTIVE SO FAR: ${Math.round(item.accumulated / 60000)} MINS</div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            const data = JSON.parse(localStorage.getItem('tt_history') || '[]');
            if (data.length === 0) { list.innerHTML = '<p style="text-align:center; color:#888;">No history.</p>'; return; }
            list.innerHTML = data.map(item => `
                <div class="list-item">
                    <div class="list-title">${item.site}</div>
                    <div class="list-meta">${item.type} | ${item.date} @ ${item.time}</div>
                    <div style="font-weight:bold; color:var(--action-blue); font-size:12px;">TIME: ${item.duration} MINS</div>
                </div>
            `).join('');
        }

        const config = [
            { file: 'Assets Map- Alleyway sites.csv.kml', label: 'Alleyways', color: '#ff00ff', icon: '🛣️', isPath: true },
            { file: 'Wellington Electricity substation sites.kml', label: 'Substations', color: '#f1c40f', icon: '⚡' },
            { file: 'PCC Underpasses.kml', label: 'Underpasses', color: '#e74c3c', icon: '🌉' },
            { file: 'Thompson Property Group & Unique Paint SItes.kml', label: 'Unique Paint', color: '#9b59b6', icon: '💎' },
            { file: 'Traffic Light Box Sites.kml', label: 'Traffic Boxes', color: '#2ecc71', icon: '🚦' },
            { file: 'Community Buildings.kml', label: 'Comm. Buildings', color: '#3498db', icon: '🏠' },
            { file: 'PCC Mural Sites.kml', label: 'Murals', color: '#d35400', icon: '🖼️' },
            { file: 'Power Pole Area Sweeps.kml', label: 'Power Poles', color: '#000', icon: '💈' },
            { file: 'PCC Off-street Carparks.kml', label: 'Carparks', color: '#34495e', icon: '🚗' }
        ];

        function loadLayer(item) {
            const group = L.geoJson(null, {
                style: () => ({ color: item.color, weight: 10, opacity: 0.6 }),
                pointToLayer: (feat, ll) => L.marker(ll, {
                    icon: L.divIcon({
                        className: 'marker-icon',
                        html: `<div style="background:${item.color}; width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:white; font-size:22px; border:2px solid #fff;">${item.icon}</div>`,
                        iconSize: [38, 38], iconAnchor: [19, 19]
                    })
                }),
                onEachFeature: (feat, layer) => {
                    if (item.isPath && feat.geometry.type === "LineString") {
                        const coords = feat.geometry.coordinates;
                        const midPoint = [coords[Math.floor(coords.length / 2)][1], coords[Math.floor(coords.length / 2)][0]];
                        L.marker(midPoint, {
                            icon: L.divIcon({
                                className: 'marker-icon',
                                html: `<div style="background:${item.color}; width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:white; font-size:18px; border:2px solid #fff;">${item.icon}</div>`,
                                iconSize: [30, 30], iconAnchor: [15, 15]
                            })
                        }).addTo(group).on('click', (e) => { L.DomEvent.stopPropagation(e); showSite(feat, item); });
                    }
                    layer.on('click', (e) => { L.DomEvent.stopPropagation(e); showSite(feat, item); });
                }
            });
            omnivore.kml(item.file, null, group).addTo(map);

            const container = document.getElementById('layer-container');
            const row = document.createElement('div');
            row.className = 'layer-row';
            row.innerHTML = `<input type="checkbox" checked> <div class="layer-label-pill"><span>${item.icon}</span> <span style="margin-left:10px;">${item.label}</span></div>`;
            row.onclick = () => {
                const cb = row.querySelector('input'); cb.checked = !cb.checked;
                if(cb.checked) map.addLayer(group); else map.removeLayer(group);
            };
            container.appendChild(row);
        }

        function showSite(feat, item) {
            activeSite = { name: feat.properties.name || "Unnamed Site", addr: feat.properties.address || "Porirua" };
            document.getElementById('s-name').innerText = activeSite.name;
            document.getElementById('s-addr').innerText = activeSite.addr;
            document.getElementById('s-type').innerText = item.label;
            document.getElementById('s-date').innerText = (Math.floor(Math.random() * 60)) + " days ago";
            document.getElementById('site-info').style.display = 'block';
        }

        config.forEach(loadLayer);
        function toggleFS() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }
        function toggleLayers() { const el = document.getElementById('layer-container'); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }
    </script>
</body>
</html>
