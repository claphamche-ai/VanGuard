<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VanGuard | Login</title>
    <link rel="stylesheet" href="styles.css?v=1.1.6" />
</head>
<body class="login-wrapper">
    <div class="login-frame">🚐</div>
    <form class="login-form" onsubmit="handleLogin(event)">
        <input type="text" id="username" class="std-input" placeholder="Username" required autocomplete="off">
        <input type="password" id="password" class="std-input" placeholder="Password" required>
        <button type="submit" class="std-btn yellow">Log In</button>
        <div id="login-error" style="color:#e74c3c; text-align:center; margin-top:5px; font-size:13px; font-weight:bold; display:none;">Invalid credentials</div>
    </form>
    <div class="login-brand">
        <h1>VanGuard <span class="version">v1.1.6</span></h1>
    </div>
    <script src="app.js?v=1.1.6"></script>
    <script>
        function handleLogin(e) { 
            e.preventDefault(); 
            const u = document.getElementById('username').value.toLowerCase().trim(); 
            const p = document.getElementById('password').value.trim(); 
            const err = document.getElementById('login-error'); err.style.display = 'none'; 
            
            if (u === 'god' && p === 'god') { window.location.href = 'god.html'; return; } 
            
            const users = CoreDB.getUsers(); 
            const userMatch = users.find(user => user.username.toLowerCase() === u && user.password === p); 
            
            if (userMatch) { 
                if (userMatch.status === 'INACTIVE') { err.innerText = "Account is inactive."; err.style.display = 'block'; return; } 
                CoreDB.setActiveTenantId(userMatch.tenantId); 
                localStorage.setItem('vg_active_user', userMatch.username); 
                
                if (userMatch.role === 'admin') window.location.href = 'admin.html'; 
                else if (userMatch.role === 'dispatch') window.location.href = 'dispatch.html'; 
                else if (userMatch.role === 'agent') window.location.href = 'agent.html'; 
                else if (userMatch.role === 'reporter') window.location.href = 'reporter.html'; 
            } else { 
                err.innerText = "Invalid credentials"; err.style.display = 'block'; 
            } 
        }
    </script>
</body>
</html>
