<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanGuard | Accounts</title>
    <link rel="stylesheet" href="styles.css?v=4.7" />
</head>
<body data-role="accounts" class="admin-bg" style="background: transparent;">
    <div class="admin-content" style="padding: 20px; margin-top: 0; min-height: auto;">
        <div style="width: 100%; max-width: 900px; margin: 0 auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0; font-weight: 900; text-transform: uppercase; color: var(--text-dark);">Fleet Accounts</h2>
                <button class="std-btn green" style="width: auto; padding: 10px 20px;" onclick="AccountsCtrl.openCreateForm()">➕ Add User</button>
            </div>
            
            <div id="accounts-create-form" class="tenant-panel" style="display: none; background: #e3f2fd; border-color: var(--b); margin-bottom: 20px; padding: 20px;">
                <h3 style="margin-top:0; color: var(--b); font-size: 14px; text-transform: uppercase;">Create New Account</h3>
                <div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr auto;">
                    <input type="text" id="new-acc-username" class="std-input" placeholder="Username" style="margin-bottom:0;">
                    <input type="password" id="new-acc-password" class="std-input" placeholder="Password" style="margin-bottom:0;">
                    <select id="new-acc-role" class="std-input" style="margin-bottom:0;">
                        <option value="agent">Field Agent / Worker</option>
                        <option value="dispatch">Dispatcher</option>
                        <option value="reporter">Reporter</option>
                        <option value="admin">Tenant Admin</option>
                    </select>
                    <div style="display: flex; gap: 5px;">
                        <button class="std-btn blue" style="padding: 0 15px;" onclick="AccountsCtrl.createUser()">Save</button>
                        <button class="std-btn red" style="padding: 0 15px;" onclick="AccountsCtrl.closeCreateForm()">✕</button>
                    </div>
                </div>
            </div>

            <div class="tenant-panel" style="padding: 0; overflow: hidden;">
                <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                    <tr style="background: var(--nav-dark); color: white;">
                        <th style="padding: 15px;">Username</th>
                        <th style="padding: 15px;">Role</th>
                        <th style="padding: 15px; width: 100px;">Action</th>
                    </tr>
                    <tbody id="accounts-list-render"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="app.js?v=4.7"></script>
</body>
</html>
