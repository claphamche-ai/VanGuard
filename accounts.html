<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>VanGuard | Accounts</title><link rel="stylesheet" href="styles.css?v=4.9.1" /><style>body{background:transparent;}</style></head><body data-role="accounts"><div class="module-content"><div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;"><div><h2 style="margin:0; font-weight: 900; text-transform: uppercase;">Fleet Accounts</h2><div id="license-counter" style="font-size: 13px; font-weight: bold; color: var(--b);">Licenses: --</div></div><button class="std-btn green" style="width: auto; padding: 10px 20px;" onclick="AccountsCtrl.openCreateForm()">➕ Add User</button></div><div id="accounts-create-form" class="tenant-panel" style="display:none; background:#e3f2fd; border-color:var(--b); margin-bottom:20px; padding:20px;"><h3 style="margin-top:0; color: var(--b);">Create New</h3><div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr;"><div><input type="text" id="new-acc-username" class="std-input" placeholder="Username"></div><div><input type="password" id="new-acc-password" class="std-input" placeholder="Pass"></div><div><select id="new-acc-role" class="std-input"><option value="agent">Agent</option><option value="dispatch">Dispatch</option><option value="admin">Admin</option></select></div><div><input type="text" id="new-acc-name" class="std-input" placeholder="Name"></div><div><input type="text" id="new-acc-contact" class="std-input" placeholder="Contact"></div><div><select id="new-acc-status" class="std-input"><option value="ACTIVE">Active</option><option value="INACTIVE">Inactive</option></select></div></div><div style="display:flex; gap:10px; margin-top:10px;"><button class="std-btn blue" style="width:auto;" onclick="AccountsCtrl.createUser()">Save</button><button class="std-btn red" style="width:auto;" onclick="AccountsCtrl.closeCreateForm()">Cancel</button></div></div><div id="accounts-edit-form" class="tenant-panel" style="display:none; background:#fff3cd; border-color:#f1c40f; margin-bottom:20px; padding:20px;"><h3 style="margin-top:0; color: #d35400;">Edit</h3><input type="hidden" id="edit-acc-id"><div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr;"><div><input type="text" id="edit-acc-username" class="std-input"></div><div><input type="text" id="edit-acc-password" class="std-input"></div><div><select id="edit-acc-role" class="std-input"><option value="agent">Agent</option><option value="dispatch">Dispatch</option><option value="admin">Admin</option></select></div><div><input type="text" id="edit-acc-name" class="std-input"></div><div><input type="text" id="edit-acc-contact" class="std-input"></div><div><select id="edit-acc-status" class="std-input"><option value="ACTIVE">Active</option><option value="INACTIVE">Inactive</option></select></div></div><div style="display:flex; justify-content:space-between; margin-top:10px;"><button class="std-btn red" style="width:auto;" onclick="AccountsCtrl.deleteUserFromEdit()">Delete</button><div style="display:flex; gap:10px;"><button class="std-btn gray" style="width:auto;" onclick="AccountsCtrl.closeEditForm()">Cancel</button><button class="std-btn blue" style="width:auto;" onclick="AccountsCtrl.saveUser()">Update</button></div></div></div><div class="tenant-panel" style="padding:0; overflow:hidden;"><table style="width:100%; border-collapse:collapse; text-align:left; font-size:14px;"><tr style="background:var(--nav-dark); color:white;"><th style="padding:15px;">User</th><th style="padding:15px;">Role</th><th style="padding:15px;">Status</th></tr><tbody id="accounts-list-render"></tbody></table></div></div><div class="version-stamp">v4.9.1</div><script src="app.js?v=4.9.1"></script></body></html>
