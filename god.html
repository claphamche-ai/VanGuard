<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanGuard | Super Admin Configuration</title>
    <link rel="stylesheet" href="styles.css?v=3.20" />
</head>
<body class="admin-bg">
    <nav class="admin-topbar">
        <div class="admin-nav-group">
            <div class="admin-nav-item logout-item" onclick="location.href='index.html'">
                <span class="icon">🚪</span>
                <span class="label">Log Out</span>
            </div>
            <div class="admin-nav-item active-nav" onclick="switchGodTab('welcome')">
                <span class="icon">🌍</span>
                <span class="label">Core</span>
            </div>
            <div class="admin-nav-item" onclick="switchGodTab('database')">
                <span class="icon">🗄️</span>
                <span class="label">Database</span>
            </div>
        </div>
    </nav>

    <main class="admin-content">
        <div id="god-tab-welcome" class="admin-welcome-box god-tab-content">
            <h1 style="font-size: 36px; font-weight: 900; color: var(--text-dark); margin: 0; text-transform: uppercase; letter-spacing: -1px;">VanGuard Core</h1>
            <p style="font-size: 14px; font-weight: bold; color: #888; margin: 5px 0 30px 0;">Version 3.20 | System Configuration Node</p>
            <div style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed #ccc; text-align: left;">
                <h3 style="margin-top:0; color: var(--text-dark); font-weight: 900; text-transform: uppercase;">Export Code Pipeline</h3>
                <textarea id="db-export-box" class="std-input textarea" readonly style="font-family: monospace; font-size: 11px; height: 100px; background: #fafafa; cursor: text;" placeholder="Database code will appear here..."></textarea>
                <button class="std-btn blue" onclick="exportDatabaseToBox()">Generate Export Code</button>
            </div>
        </div>
        <div id="god-tab-database" class="god-tab-content" style="display:none; width: 100%; max-width: 800px;">
            <h2 style="margin-top:0; color: var(--text-dark); font-weight: 900; text-transform: uppercase; margin-bottom: 20px;">Master Schema Dictionary</h2>
            <div class="tenant-panel" style="padding-top: 20px;">
                <div id="god-schema-render" style="border: 1px solid #ddd; border-radius: 8px; overflow: hidden;"></div>
                <div style="margin-top: 30px; padding-top: 20px; border-top: 2px dashed #eee;">
                    <h3 style="margin-top:0; color: var(--b);">➕ Append New Global Field</h3>
                    <div style="display: grid; grid-template-columns: 2fr 1fr auto; gap: 10px; align-items: center;">
                        <input type="text" id="new-global-field-name" class="std-input" placeholder="New Field Title" style="margin-bottom: 0;">
                        <select id="new-global-field-type" class="std-input" style="margin-bottom: 0;">
                            <option value="text">Text Input</option>
                            <option value="number">Number Input</option>
                            <option value="select">Drop-down Menu</option>
                        </select>
                        <button class="std-btn blue" style="width: auto; padding: 0 25px;" onclick="addNewGodField()">Create</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="app.js?v=3.20"></script>
    <script>
        function switchGodTab(tabId) {
            document.querySelectorAll('.god-tab-content').forEach(el => el.style.display = 'none');
            document.getElementById('god-tab-' + tabId).style.display = 'block';
            document.querySelectorAll('.admin-nav-item').forEach(el => el.classList.remove('active-nav'));
            event.currentTarget.classList.add('active-nav');
        }
        function exportDatabaseToBox() {
            const db = getDB();
            const exportBox = document.getElementById('db-export-box');
            exportBox.value = `const defaultSchema = ${JSON.stringify(db, null, 4)};`;
            exportBox.select();
            exportBox.setSelectionRange(0, 99999); 
        }
    </script>
</body>
</html>
