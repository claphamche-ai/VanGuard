<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">VanGuard | Agent v3.1</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div id="live-timer-widget">00:00</div>
    <div id="menu-trigger" class="menu-trigger" onclick="openSidebar()">
        <span></span><span></span><span></span>
    </div>
    <button id="fs-btn" class="map-control-btn fs-btn" onclick="toggleFS()">⛶</button>
    <button id="gps-btn" class="map-control-btn gps-btn" onclick="centerGPS()">📍</button>

    <div id="sidebar">
        <div class="sidebar-close" onclick="closeSidebar()" style="cursor:pointer; font-size:24px; font-weight:bold; float:right;">✕</div>
        <div id="brand-name" class="sidebar-header" style="clear:both;">VanGuard</div>
        <div class="sidebar-version">Version 3.1 | AGENT</div>
        <div id="menu-clock" class="sidebar-clock">--</div>
        
        <div class="nav-item" onclick="toggleLayerList()">🗺️ Map Layers</div>
        <div id="layer-container" class="layer-list" style="display:none;"></div>
        <div class="nav-item" onclick="openOverlay('jobbank')">📋 Job Bank</div>
        <div class="nav-item" onclick="alert('Add Site Mode Active')">➕ Add Site</div>
        
        <div class="nav-item" style="margin-top:20px; color:red; padding-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.1);" onclick="location.href='index.html'">🚪 Log Out</div>

        <div style="margin-top: 15px; padding-top: 10px;">
            <label style="font-size: 12px; font-weight: bold; color: #666; display: block; margin-bottom: 8px;">Menu Opacity</label>
            <input type="range" id="menu-opacity-slider" min="0" max="1" step="0.05" value="0.95" style="width: 100%; accent-color: var(--b);" oninput="document.getElementById('sidebar').style.backgroundColor = `rgba(255, 255, 255, ${this.value})`">
        </div>
    </div>

    <!-- (Site Info & Forms intentionally omitted here for script length, assume identical to v3.1 standard) -->
    <!-- MAP CONTAINER -->
    <div id="map-wrapper">
        <div id="map"></div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
