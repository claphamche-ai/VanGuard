<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanGuard | Dispatch Terminal v3.21</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css?v=3.21" />
</head>
<body style="margin: 0; padding: 0; overflow: hidden;">
    
    <!-- Exact same Agent hamburger trigger -->
    <div id="menu-trigger" class="menu-trigger" onclick="openSidebar()" style="z-index: 4000;">
        <span></span><span></span><span></span>
    </div>

    <!-- Agent Sidebar Ported to Dispatch -->
    <div id="sidebar" style="z-index: 5000;">
        <div class="sidebar-close" onclick="closeSidebar()" style="cursor:pointer; font-size:24px; font-weight:bold; float:right;">✕</div>
        <div class="sidebar-header" style="clear:both;">VanGuard</div>
        <div class="sidebar-version">Version 3.21 | DISPATCH</div>
        
        <div class="nav-item" onclick="toggleLayerList()">🗺️ Map Layers</div>
        <div id="layer-container" class="layer-list" style="display:none;"></div>
        
        <div class="nav-item" onclick="location.href='admin.html'" style="margin-top: 20px;">🏛️ Admin Dashboard</div>
        <div class="nav-item logout-item" style="border-bottom: 1px solid rgba(0,0,0,0.1);" onclick="location.href='index.html'">🚪 Log Out</div>
    </div>

    <div class="dispatch-layout-new">
        <!-- Live Map Area -->
        <div id="dispatch-map" class="dispatch-map-area"></div>

        <!-- Right Side Control Panel -->
        <div class="dispatch-panel">
            <div class="dispatch-panel-header">
                <h2>📋 Operations Control</h2>
            </div>
            
            <div class="dispatch-panel-section">
                <div class="section-label" style="margin-top: 0;">Address & Geo-Search</div>
                <div class="form-grid" style="grid-template-columns: 1fr auto; margin-bottom: 0;">
                    <input type="text" id="dispatch-search" class="std-input" placeholder="Search address, park..." style="margin-bottom:0;">
                    <button class="std-btn blue" style="width: auto; padding: 0 20px;" onclick="searchDispatchAddress()">🔍</button>
                </div>
            </div>

            <div class="dispatch-panel-section">
                <div class="section-label" style="margin-top: 0;">Create & Dispatch Job</div>
                <input type="text" id="dispatch-addr" class="std-input" placeholder="Click Map Asset or Search..." style="background: #e8f5e9;" required>
                <input type="text" id="dispatch-srn" class="std-input" placeholder="Service Request Number (SRN)">
                <textarea id="dispatch-notes" class="std-input textarea" placeholder="Job details, constraints, reporting party info..." style="height: 60px;"></textarea>
                <button class="std-btn green" onclick="dispatchNewJob()">📡 Route to Job Bank</button>
            </div>

            <div class="dispatch-panel-section" style="flex: 1; overflow-y: auto; padding-right: 5px;">
                <div class="section-label" style="margin-top: 0;">Live Job Bank (Global)</div>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button class="std-btn blue" style="padding: 10px; font-size: 12px;" onclick="renderDispatchBank('PENDING')">Active / Pending</button>
                    <button class="std-btn gray" style="padding: 10px; font-size: 12px;" onclick="renderDispatchBank('COMPLETED')">Completed</button>
                </div>
                <div id="dispatch-bank-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>
    <script>
        // Sidebar logic
        function openSidebar() { document.getElementById('sidebar').classList.add('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); }
        function toggleLayerList() {
            const el = document.getElementById('layer-container');
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        // Init Dispatch Map
        const dispatchMap = L.map('dispatch-map', { zoomControl: false }).setView([-41.135, 174.84], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(dispatchMap);
        let searchMarker = null;
        let layers = {};

        // Load KML Layers directly into Dispatch Map
        const config = [
            { file: 'Assets Map- Alleyway sites.csv.kml', label: 'Alleyway', color: '#ff00ff', icon: '🛣️' },
            { file: 'Wellington Electricity substation sites.kml', label: 'Substation', color: '#f1c40f', icon: '⚡' },
            { file: 'PCC Underpasses.kml', label: 'Underpass', color: '#e74c3c', icon: '🌉' },
            { file: 'Thompson Property Group & Unique Paint SItes.kml', label: 'Unique', color: '#9b59b6', icon: '💎' },
            { file: 'Traffic Light Box Sites.kml', label: 'Traffic', color: '#2ecc71', icon: '🚦' },
            { file: 'Community Buildings.kml', label: 'Community', color: '#3498db', icon: '🏠' },
            { file: 'PCC Mural Sites.kml', label: 'Mural', color: '#d35400', icon: '🖼️' },
            { file: 'Power Pole Area Sweeps.kml', label: 'Power Pole', color: '#000000', icon: '💈' },
            { file: 'PCC Off-street Carparks.kml', label: 'Carpark', color: '#34495e', icon: '🚗' }
        ];

        const container = document.getElementById('layer-container');

        config.forEach(item => {
            const div = document.createElement('div');
            div.className = 'layer-item';
            div.innerHTML = `<label style="display:flex; align-items:center; cursor:pointer;"><input type="checkbox" checked onchange="toggleLayer('${item.label}', this.checked)" style="margin-right:10px; width:18px; height:18px;"> <span style="font-size:18px; margin-right:8px;">${item.icon}</span> ${item.label}</label>`;
            container.appendChild(div);
            const group = L.featureGroup();
            layers[item.label] = group;

            const customLayer = L.geoJson(null, {
                style: function() { return { color: item.color, weight: 6, opacity: 0.7 }; },
                pointToLayer: function(feature, latlng) {
                    const marker = L.marker(latlng, {
                        icon: L.divIcon({
                            className: '',
                            html: `<div class="marker-inner" style="background-color: ${item.color}; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5); font-size: 18px;">${item.icon}</div>`,
                            iconSize: [38, 38],
                            iconAnchor: [19, 19]
                        })
                    });
                    
                    marker.on('click', function(e) {
                        L.DomEvent.stopPropagation(e);
                        // DISPATCH CLICK LOGIC - Auto-fill panel instead of popup
                        const name = feature.properties?.name || "Unknown Site";
                        const addrInput = document.getElementById('dispatch-addr');
                        addrInput.value = name;
                        
                        // Visual flash to confirm grab
                        addrInput.style.backgroundColor = '#2ecc71';
                        addrInput.style.color = '#fff';
                        setTimeout(() => {
                            addrInput.style.backgroundColor = '#e8f5e9';
                            addrInput.style.color = '#333';
                        }, 300);
                    });
                    return marker;
                }
            });

            const runLayer = omnivore.kml(item.file, null, customLayer);
            runLayer.on('ready', function() {
                runLayer.eachLayer(function(layer) {
                    if (layer instanceof L.Polygon || layer instanceof L.Polyline) {
                        const center = layer.getBounds().getCenter();
                        const centerMarker = L.marker(center, {
                            icon: L.divIcon({
                                className: '',
                                html: `<div class="marker-inner" style="background-color: ${item.color}; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5); font-size: 18px;">${item.icon}</div>`,
                                iconSize: [38, 38],
                                iconAnchor: [19, 19]
                            })
                        });
                        
                        centerMarker.on('click', function(e) {
                            L.DomEvent.stopPropagation(e);
                            const name = layer.feature?.properties?.name || "Unknown Area";
                            const addrInput = document.getElementById('dispatch-addr');
                            addrInput.value = name;
                            
                            addrInput.style.backgroundColor = '#2ecc71';
                            addrInput.style.color = '#fff';
                            setTimeout(() => {
                                addrInput.style.backgroundColor = '#e8f5e9';
                                addrInput.style.color = '#333';
                            }, 300);
                        });
                        group.addLayer(centerMarker);
                    }
                });
                dispatchMap.addLayer(group);
            });
            group.addLayer(runLayer);
        });

        window.toggleLayer = function(name, show) {
            if(show) { dispatchMap.addLayer(layers[name]); } else { dispatchMap.removeLayer(layers[name]); }
        };

        // Address Search
        async function searchDispatchAddress() {
            const query = document.getElementById('dispatch-search').value;
            if(!query) return;
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&countrycodes=nz`);
                const data = await res.json();
                
                if(data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    dispatchMap.setView([lat, lon], 17);
                    
                    if(searchMarker) dispatchMap.removeLayer(searchMarker);
                    searchMarker = L.marker([lat, lon]).addTo(dispatchMap);
                    
                    const addrInput = document.getElementById('dispatch-addr');
                    addrInput.value = data[0].display_name.split(',')[0];
                    addrInput.style.backgroundColor = '#2ecc71';
                    addrInput.style.color = '#fff';
                    setTimeout(() => {
                        addrInput.style.backgroundColor = '#e8f5e9';
                        addrInput.style.color = '#333';
                    }, 300);
                } else {
                    alert("Location not found.");
                }
            } catch(e) {
                console.error("Geocoding failed", e);
            }
        }

        function dispatchNewJob() {
            const addr = document.getElementById('dispatch-addr').value.trim();
            const srn = document.getElementById('dispatch-srn').value.trim();
            const notes = document.getElementById('dispatch-notes').value.trim();
            
            if(!addr) { alert("Site Location is required to dispatch a job."); return; }

            let bank = JSON.parse(localStorage.getItem('tt_jobbank') || '[]');
            
            const newJob = {
                site: addr,
                srn: srn || 'N/A',
                type: 'PENDING',
                notes: notes,
                accumulated: 0,
                pausedAt: new Date().toLocaleString('en-NZ'),
                dispatchId: 'D-' + Math.floor(Math.random() * 90000 + 10000)
            };
            
            bank.unshift(newJob);
            localStorage.setItem('tt_jobbank', JSON.stringify(bank));
            
            document.getElementById('dispatch-addr').value = '';
            document.getElementById('dispatch-srn').value = '';
            document.getElementById('dispatch-notes').value = '';
            document.getElementById('dispatch-search').value = '';
            if(searchMarker) dispatchMap.removeLayer(searchMarker);
            
            renderDispatchBank('PENDING');
        }

        function renderDispatchBank(filterType = 'PENDING') {
            const listEl = document.getElementById('dispatch-bank-list');
            const data = JSON.parse(localStorage.getItem('tt_jobbank') || '[]');
            
            const filtered = data.filter(job => 
                (filterType === 'PENDING' && job.type !== 'COMPLETED') ||
                (filterType === 'COMPLETED' && job.type === 'COMPLETED')
            );
            
            if (filtered.length === 0) { 
                listEl.innerHTML = `<p style="text-align:center; color:#888; font-size:13px; margin-top:20px;">No ${filterType.toLowerCase()} jobs in queue.</p>`; 
                return; 
            }
            
            listEl.innerHTML = filtered.map((job, i) => `
                <div style="background:var(--bg-white); border: 1px solid #ddd; margin-bottom:10px; padding:15px; border-radius:8px; font-size:13px; border-left: 4px solid ${job.type==='WORK'?'#f1c40f':(job.type==='INSPECTION'?'#3498db':(job.type==='PENDING'?'#9b59b6':'#e74c3c'))};">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <strong style="color:var(--text-dark);">${job.site}</strong>
                        <span class="badge blue" style="background:#333;">${job.srn !== 'N/A' && job.srn ? job.srn : 'No SRN'}</span>
                    </div>
                    <div style="color:#666; margin-bottom: 5px;">Status: <span style="font-weight:bold; color:var(--b);">${job.type}</span></div>
                    <div style="color:#888; font-size: 11px;">Timestamp: ${job.pausedAt}</div>
                    ${job.notes ? `<div style="margin-top:8px; padding:8px; background:#f9f9f9; border-radius:4px; color:#555;"><i>"${job.notes}"</i></div>` : ''}
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => renderDispatchBank('PENDING'));
    </script>
</body>
</html>
