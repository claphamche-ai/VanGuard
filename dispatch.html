<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VanGuard | Dispatch Terminal</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css?v=4.2" />
</head>
<body data-role="dispatch" style="margin:0; padding:0; overflow:hidden;">
    <div class="menu-trigger" onclick="UI.openLeftSidebar()"><span></span><span></span><span></span></div>
    <div class="jobbank-trigger" onclick="UI.openRightSidebar()">📋 BANK</div>

    <!-- Left Sidebar (Tools & Layers) -->
    <div id="left-sidebar" class="sidebar">
        <div class="sidebar-close" onclick="UI.closeLeftSidebar()">✕</div>
        <div class="sidebar-header">VanGuard</div>
        <div class="sidebar-version">Version 4.2 | DISPATCH</div>
        
        <div style="margin-top: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(0,0,0,0.1);">
            <label style="font-size: 12px; font-weight: bold; color: #666; display: block; margin-bottom: 8px;">Address & Geo-Search</label>
            <div style="display:flex; gap:5px;">
                <input type="text" id="dispatch-search" class="std-input" placeholder="Search address..." style="margin-bottom:0; padding:10px; font-size: 13px;">
                <button class="std-btn blue" style="width: auto; padding: 0 15px;" onclick="DispatchCtrl.searchAddress()">🔍</button>
            </div>
        </div>

        <div class="nav-item" onclick="UI.toggleLayerList()">🗺️ Map Layers</div>
        <div id="layer-container" class="layer-list" style="display:none;"></div>
        
        <!-- Only shown if loaded standalone, Admin iframe hides this via JS -->
        <div id="standalone-logout" class="nav-item logout-item" style="margin-top:20px; border-top: 1px solid rgba(0,0,0,0.1);" onclick="location.href='index.html'">🚪 Log Out</div>
    </div>

    <!-- Right Sidebar (Job Bank) -->
    <div id="right-sidebar" class="sidebar-right">
        <div class="sidebar-close" onclick="UI.closeRightSidebar()" style="float:left;">✕</div>
        <div class="sidebar-header" style="text-align:right;">Job Bank</div>
        <div class="sidebar-version" style="text-align:right;">Global Queue</div>
        <div style="display: flex; gap: 5px; margin: 15px 0;">
            <button class="std-btn blue" style="padding: 10px; font-size: 12px;" onclick="DispatchCtrl.renderBank('PENDING')">Pending</button>
            <button class="std-btn gray" style="padding: 10px; font-size: 12px;" onclick="DispatchCtrl.renderBank('COMPLETED')">Completed</button>
        </div>
        <div id="dispatch-bank-list"></div>
    </div>

    <!-- Dispatch Site Info Popup -->
    <div id="site-info" class="popup-box">
        <div class="info-header"><span id="s-name">Select Site</span><button onclick="UI.closePopup('site-info')">✕</button></div>
        <div class="info-body">
            <div class="site-meta" style="flex:1;">
                <div class="meta-row"><span class="meta-label">Type:</span> <span id="s-type" class="meta-value">--</span></div>
                <div class="meta-row"><span class="meta-label">Address:</span> <input type="text" id="s-address" class="inline-input" readonly></div>
            </div>
        </div>
        <div class="action-grid" style="grid-template-columns: 1fr 1fr;">
            <button class="std-btn gray" onclick="DispatchCtrl.openHistory()">History / Notes</button>
            <button class="std-btn green" onclick="DispatchCtrl.openDispatchForm()">Dispatch Job</button>
        </div>
    </div>

    <!-- Dispatch Job Creation Overlay -->
    <div id="dispatch-overlay" class="full-overlay">
        <div class="form-header"><span>DISPATCH JOB</span><button onclick="UI.closeOverlay('dispatch')">✕</button></div>
        <div class="form-content">
            <p>Target Site: <strong id="dispatch-target-name" style="color: var(--b);">--</strong></p>
            <div class="section-label">Job Details</div>
            <input type="text" id="dispatch-srn" class="std-input" placeholder="Service Request Number (SRN)">
            <textarea id="dispatch-notes" class="std-input textarea" placeholder="Job details, constraints, reporting party info..."></textarea>
            
            <div id="permanent-asset-request" style="display:none; background: #fff3cd; padding: 15px; border-radius: 8px; border-left: 4px solid #f1c40f; margin-bottom: 15px;">
                <label style="display: flex; align-items: center; font-size: 13px; font-weight: bold; color: #333; cursor: pointer;">
                    <input type="checkbox" id="dispatch-make-permanent" style="width: 20px; height: 20px; margin-right: 10px;">
                    Request Admin approval to log this location as a permanent mapped asset.
                </label>
            </div>
            <div class="footer-btns" style="grid-template-columns: 1fr 2fr;">
                <button class="std-btn red" onclick="UI.closeOverlay('dispatch')">Cancel</button>
                <button class="std-btn yellow" onclick="DispatchCtrl.submitJob()">Push to Job Bank</button>
            </div>
        </div>
    </div>

    <div id="history-overlay" class="full-overlay">
        <div class="form-header"><span>SITE HISTORY</span><button onclick="UI.closeOverlay('history')">✕</button></div>
        <div class="form-content">
            <p>Target Site: <strong id="history-target-name" style="color: var(--b);">--</strong></p>
            <div style="background: #eee; padding: 20px; border-radius: 8px; text-align: center; color: #666; font-style: italic;">
                No previous history logs or specific site notes found in database for this asset.
            </div>
        </div>
    </div>

    <div id="dispatch-map" class="full-map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script>
    <script src="app.js?v=4.2"></script>
</body>
</html>
