<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>VanGuard | Dispatch</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /><link rel="stylesheet" href="styles.css?v=5.0.0" /></head><body data-role="dispatch" style="margin:0; overflow:hidden;"><div class="menu-trigger" onclick="UI.openLeftSidebar()"><span></span><span></span><span></span></div><div class="jobbank-trigger" onclick="UI.openRightSidebar()">BANK</div><div id="left-sidebar" class="sidebar"><div class="sidebar-header">VanGuard</div><input type="text" id="dispatch-search" class="std-input" placeholder="Search..."><button class="std-btn blue" onclick="DispatchCtrl.searchAddress()">Search</button><div id="layer-container" class="layer-list"></div></div><div id="right-sidebar" class="sidebar-right"><div id="dispatch-bank-list"></div></div><div id="site-info" class="popup-box"><div class="info-header"><span id="s-name">Site</span></div><div class="info-body"><div class="site-meta"><span id="s-type">--</span><input type="text" id="s-address" class="std-input" readonly></div></div><div class="action-grid" style="grid-template-columns: 1fr 1fr;"><button class="std-btn gray" onclick="DispatchCtrl.openHistory()">History</button><button class="std-btn green" onclick="DispatchCtrl.openDispatchForm()">Dispatch</button></div></div><div id="dispatch-overlay" class="full-overlay"><div class="form-header">DISPATCH</div><div class="form-content"><h2 id="dispatch-target-name">--</h2><input type="text" id="dispatch-srn" class="std-input" placeholder="SRN"><div id="assign-container" style="display:none;"><select id="dispatch-assign" class="std-input"></select></div><textarea id="dispatch-notes" class="std-input textarea"></textarea><button class="std-btn yellow" onclick="DispatchCtrl.submitJob()">Push</button><button class="std-btn red" onclick="UI.closeOverlay('dispatch')">Cancel</button></div></div><div id="agent-tracker-overlay" class="full-overlay"><div class="form-header" id="tracker-name-title">Logs</div><div class="form-content"><input type="hidden" id="tracker-user-id"><input type="date" id="tracker-date" onchange="DispatchCtrl.renderAgentTracker()"><div id="tracker-results"></div></div></div><div id="dispatch-map" class="full-map"></div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script><script src="app.js?v=5.0.0"></script></body></html>
