<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>VanGuard | Dispatch</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" /><link rel="stylesheet" href="styles.css?v=4.11.0" /></head><body data-role="dispatch" style="margin:0; padding:0; overflow:hidden;"><div class="menu-trigger" onclick="UI.openLeftSidebar()"><span></span><span></span><span></span></div><div class="jobbank-trigger" onclick="UI.openRightSidebar()">📋 BANK</div><div id="left-sidebar" class="sidebar"><div class="sidebar-close" onclick="UI.closeLeftSidebar()">✕</div><div class="sidebar-header">VanGuard</div><div class="sidebar-version">DISPATCH</div><div style="margin-top: 20px; padding-bottom: 15px;"><input type="text" id="dispatch-search" class="std-input" placeholder="Search..."><button class="std-btn blue" onclick="DispatchCtrl.searchAddress()">🔍 Search</button></div><div class="nav-item" onclick="UI.toggleLayerList()">🗺️ Layers</div><div id="layer-container" class="layer-list" style="display:none;"></div><div id="standalone-logout" class="nav-item logout-item" style="margin-top:20px;" onclick="location.href='index.html'">🚪 Log Out</div></div><div id="right-sidebar" class="sidebar-right"><div class="sidebar-close" onclick="UI.closeRightSidebar()">✕</div><div class="sidebar-header" style="text-align:right;">Job Bank</div><div style="display: flex; gap: 5px; margin: 15px 0;"><button class="std-btn blue" onclick="DispatchCtrl.renderBank('PENDING')">Pending</button><button class="std-btn gray" onclick="DispatchCtrl.renderBank('COMPLETED')">Completed</button></div><div id="dispatch-bank-list"></div></div><div id="site-info" class="popup-box"><div class="info-header"><span id="s-name">Site</span><button onclick="UI.closePopup('site-info')">✕</button></div><div class="info-body"><div class="site-meta"><div class="meta-row"><span id="s-type">--</span></div><div class="meta-row"><input type="text" id="s-address" class="inline-input" readonly></div></div></div><div class="action-grid" style="grid-template-columns: 1fr 1fr;"><button class="std-btn gray" onclick="DispatchCtrl.openHistory()">History</button><button class="std-btn green" onclick="DispatchCtrl.openDispatchForm()">Dispatch</button></div></div><div id="dispatch-overlay" class="full-overlay"><div class="form-header"><span>DISPATCH</span><button onclick="UI.closeOverlay('dispatch')">✕</button></div><div class="form-content"><p>Site: <strong id="dispatch-target-name">--</strong></p><input type="text" id="dispatch-srn" class="std-input" placeholder="SRN"><div id="assign-container" style="display:none; margin-bottom:10px;"><label class="section-label" style="margin-top:0;">Assign To:</label><select id="dispatch-assign" class="std-input"><option value="UNASSIGNED">Open Pool (Any Active Worker)</option></select></div><textarea id="dispatch-notes" class="std-input textarea" placeholder="Notes..."></textarea><div id="permanent-asset-request" style="display:none;"><label><input type="checkbox" id="dispatch-make-permanent"> Request Admin mapped asset</label></div><div class="footer-btns"><button class="std-btn red" onclick="UI.closeOverlay('dispatch')">Cancel</button><button class="std-btn yellow" onclick="DispatchCtrl.submitJob()">Push</button></div></div></div><div id="history-overlay" class="full-overlay"><div class="form-header"><span>SITE HISTORY</span><button onclick="UI.closeOverlay('history')">✕</button></div><div class="form-content"><p>Site: <strong id="history-target-name">--</strong></p><div>No previous logs.</div></div></div><div id="agent-tracker-overlay" class="full-overlay"><div class="form-header"><span id="tracker-name-title">Agent Logs</span><button onclick="UI.closeOverlay('agent-tracker')">✕</button></div><div class="form-content"><input type="hidden" id="tracker-user-id"><div style="background:#f4f6f8; padding:15px; border-radius:8px; margin-bottom:20px;"><label style="font-weight:bold; font-size:12px; color:#555; text-transform:uppercase;">Select Date to View Shift Data:</label><input type="date" id="tracker-date" class="std-input" style="margin-top:5px; margin-bottom:0;" onchange="DispatchCtrl.renderAgentTracker()"></div><div id="tracker-results"></div></div></div><div id="dispatch-map" class="full-map"></div><div class="version-stamp">v4.11.0</div><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://api.mapbox.com/mapbox.js/plugins/leaflet-omnivore/v0.3.1/leaflet-omnivore.min.js"></script><script src="app.js?v=4.11.0"></script></body></html>
